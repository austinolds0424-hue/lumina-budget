// 1. Immediately Wire Up the Offline Escape Hatch
window.forceStartOffline = function() {
    clearTimeout(window.emergencyTimer);
    const localMemory = localStorage.getItem('lumina_local_save');
    if (localMemory) {

};

// 2. Set the 4-Second Auto-Nuke Timer
window.emergencyTimer = setTimeout(() => {
    const debug = document.getElementById('debug-text');
    if(debug) debug.innerText = "Network blocked. Booting from local memory...";
    window.forceStartOffline();
}, 4000);

// 3. Attempt to Download Cloud Scripts Dynamically
async function initCloudState() {
    const debug = document.getElementById('debug-text');
    try {
        debug.innerText = "Step 1/3: Downloading Cloud Modules...";
        const appModule = await import("https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js");
        const firestoreModule = await import("https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js");
        const authModule = await import("https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js");

        debug.innerText = "Step 2/3: Authenticating...";
        const firebaseConfig = {
            apiKey: "AIzaSyDDAEXVWjIAVhxbGGoXwf7DCNcpLnWbef8",
            authDomain: "lumina-budget-68f2e.firebaseapp.com",
            projectId: "lumina-budget-68f2e",
            storageBucket: "lumina-budget-68f2e.firebasestorage.app",
            messagingSenderId: "607768723800",
            appId: "1:607768723800:web:f9ba689c83778ffd8a252d"
        };
        const app = appModule.initializeApp(firebaseConfig);
        const db = firestoreModule.getFirestore(app);
        const auth = authModule.getAuth(app);
        stateDocRef = firestoreModule.doc(db, "budgetApp", "mainState");
        fb_setDoc = firestoreModule.setDoc;

        await authModule.signInAnonymously(auth);
        
        debug.innerText = "Step 3/3: Syncing interface...";
        const docSnap = await firestoreModule.getDoc(stateDocRef);
        
        if (!docSnap.exists()) {
            const localMemory = localStorage.getItem('lumina_local_save');
            if (localMemory) appState = JSON.parse(localMemory);
            else appState = DEFAULT_DATA;
            await fb_setDoc(stateDocRef, appState);
        } else {
            appState = docSnap.data();
            let needsUpdate = false;
            if (!appState.payConfig) { appState.payConfig = { grossDaily: 601.87, taxRate: 32.07, dailyReimbursements: 85.72, fixedDeductions: 132.94, workDays: [] }; needsUpdate = true; }
            if (!appState.hitch || typeof appState.hitch.start === 'string') { appState.hitch = { active: false, start: null, earned: 0 }; needsUpdate = true; }
            if (needsUpdate) await fb_setDoc(stateDocRef, appState);
        }

        clearTimeout(window.emergencyTimer); 

        firestoreModule.onSnapshot(stateDocRef, (snapshot) => {
            if (snapshot.exists()) {
                appState = snapshot.data();
                if (!appState.payConfig) appState.payConfig = { grossDaily: 601.87, taxRate: 32.07, dailyReimbursements: 85.72, fixedDeductions: 132.94, workDays: [] };
                if (!appState.hitch) appState.hitch = { active: false, start: null, earned: 0 };

            }
        });

        document.getElementById('loading-overlay').style.display = 'none';
        document.getElementById('cloud-status').classList.add('bg-green-500', 'animate-pulse');
        renderApp();
        
    } catch (error) {
        clearTimeout(window.emergencyTimer);
        console.error(error);
        debug.innerText = "Cloud modules blocked. Forcing offline mode...";
        setTimeout(() => window.forceStartOffline(), 1500);
    }
}

async function saveState() {
    renderApp(); 
    localStorage.setItem('lumina_local_save', JSON.stringify(appState)); // Instant Offline Save
    
    if(fb_setDoc && stateDocRef) {
        document.getElementById('cloud-status').classList.remove('bg-green-500', 'animate-pulse', 'bg-red-500', 'bg-gray-500');
        document.getElementById('cloud-status').classList.add('bg-yellow-400');
        try {
            await fb_setDoc(stateDocRef, appState);
            document.getElementById('cloud-status').classList.remove('bg-yellow-400');
            document.getElementById('cloud-status').classList.add('bg-green-500', 'animate-pulse');
        } catch (error) {
            document.getElementById('cloud-status').classList.remove('bg-yellow-400');
            document.getElementById('cloud-status').classList.add('bg-red-500');
        }
    }
}

function formatCurrency(amount) { return new Intl.NumberFormat('en-CA', { style: 'currency', currency: 'CAD' }).format(amount); }
function formatCurrencyWithCents(amount) { return new Intl.NumberFormat('en-CA', { style: 'currency', currency: 'CAD', minimumFractionDigits: 4 }).format(amount); }
function toggleTheme() { document.documentElement.classList.toggle('dark'); }

function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.getElementById(`tab-${tabId}`).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(btn => { btn.classList.remove('text-blue-500', 'dark:text-blue-400'); if(btn.dataset.target !== 'keypad') btn.classList.add('text-gray-500', 'dark:text-gray-400', 'opacity-70'); });
    const activeBtn = document.querySelector(`.nav-btn[data-target="${tabId}"]`);
    if(activeBtn && tabId !== 'keypad') { activeBtn.classList.remove('text-gray-500', 'dark:text-gray-400', 'opacity-70'); activeBtn.classList.add('text-blue-500', 'dark:text-blue-400'); }
    
    // Smooth Scroll Fix: Snap to top when changing pages
    window.scrollTo(0, 0); 
}

function editAccount(id) {
    const acc = appState.accounts.find(a => a.id === id);
    if(acc) {
        const newVal = prompt(`Update balance for ${acc.name} ($):`, acc.balance);
        if(newVal !== null && newVal.trim() !== '' && !isNaN(newVal)) { acc.balance = parseFloat(newVal); saveState(); }
    }
}

function updateCampingTarget() {
    const newVal = prompt(`Set new goal amount for the August Camping Trip ($):`, appState.camping.target);
    if(newVal !== null && newVal.trim() !== '' && !isNaN(newVal) && parseFloat(newVal) > 0) { appState.camping.target = parseFloat(newVal); saveState(); }
}

function addCampingFunds() {
    const newVal = prompt(`Add funds to the August Camping Trip ($):`);
    if(newVal !== null && newVal.trim() !== '' && !isNaN(newVal)) { appState.camping.saved += parseFloat(newVal); saveState(); }
}

function calculateTotalNetHitch() {
    const totalDays = 16; 
    const totalGross = totalDays * appState.payConfig.grossDaily;
    const taxDeduction = totalGross * (appState.payConfig.taxRate / 100);
    const totalReimb = totalDays * appState.payConfig.dailyReimbursements;
    return totalGross - taxDeduction - appState.payConfig.fixedDeductions + totalReimb;
}

        appState.hitch.earned = 0;

    } else {
        if(appState.hitch.start) {
            const totalNet = calculateTotalNetHitch();
            const totalMs = 16 * 24 * 60 * 60 * 1000; 
            const msPassed = Date.now() - appState.hitch.start;
            appState.hitch.earned = (msPassed / totalMs) * totalNet;
        }
        appState.hitch.active = false;
        appState.hitch.start = null;
        saveState();
        const el = document.getElementById('live-grind-meter');
        if(el) el.innerText = formatCurrencyWithCents(appState.hitch.earned);
    }
}

function startGrindMeter() {
    clearInterval(liveGrindTimer);
    if(!appState || !appState.hitch.active) {
        const el = document.getElementById('live-grind-meter');
        if(el) el.innerText = formatCurrencyWithCents(appState.hitch.earned || 0);
        return;
    }
    
    liveGrindTimer = setInterval(() => {
        const el = document.getElementById('live-grind-meter');
        if(!el) return;
        const totalNet = calculateTotalNetHitch();
        const totalMs = 16 * 24 * 60 * 60 * 1000;
        const msPassed = Date.now() - appState.hitch.start;
        const earned = (msPassed / totalMs) * totalNet;
        el.innerText = formatCurrencyWithCents(earned);
    }, 100);
}

function generateInsights() {
    if(!appState) return '';
    const totalIncome = appState.income.period1 + appState.income.period2;
    const totalBills = appState.bills.reduce((sum, b) => sum + b.amount, 0);
    const unpaidCount = appState.bills.filter(b => !b.paid).length;
    let lowestBalanceDebt = appState.debts.length ? [...appState.debts].sort((a, b) => a.balance - b.balance)[0] : null;
    let insights = [];
    const remaining = totalIncome - totalBills;
    if(remaining > 0) insights.push(`Your expected income covers all bills with <strong>${formatCurrency(remaining)}</strong> left over.`);
    if (unpaidCount > 0) insights.push(`You have <strong>${unpaidCount} bills</strong> remaining this month.`);
    else insights.push(`🎉 All bills checked off!`);
    if (lowestBalanceDebt && lowestBalanceDebt.balance > 0) insights.push(`Attack <strong>${lowestBalanceDebt.name}</strong> first to build momentum (Snowball Method).`);
    return insights.map(i => `<div class="glass-panel p-3 mb-2 text-sm flex gap-3 items-start"><i data-lucide="sparkles" class="w-5 h-5 text-yellow-500 shrink-0 mt-0.5"></i> <div>${i}</div></div>`).join('');
}

function executePaydayRush(period) {
    const billsToPay = appState.bills.filter(b => b.period === period && !b.paid);
    if(billsToPay.length === 0) return alert(`All bills for Period ${period} are already paid!`);
    const total = billsToPay.reduce((s, b) => s + b.amount, 0);
    const mainAccount = appState.accounts.find(a => a.id === 1); 
    const isSure = confirm(`EXECUTE PAYDAY RUSH - PERIOD ${period}\n\nThis will instantly deduct ${formatCurrency(total)} from your ${mainAccount.name} and check off ${billsToPay.length} bills.\n\nProceed?`);
    if(isSure) {
        billsToPay.forEach(b => b.paid = true);
        if(mainAccount) mainAccount.balance -= total;
        saveState();
        alert(`Boom! ${billsToPay.length} bills cleared. Balance updated.`);
    }
}

function toggleBill(id) { const bill = appState.bills.find(b => b.id === id); if(bill) { bill.paid = !bill.paid; saveState(); } }
function deleteBill(id) { appState.bills = appState.bills.filter(b => b.id !== id); if(editingBillId === id) cancelEditBill(); saveState(); }
function editBill(id) {
    const bill = appState.bills.find(b => b.id === id); if(!bill) return;
    document.getElementById('new-bill-name').value = bill.name; document.getElementById('new-bill-amount').value = bill.amount; document.getElementById('new-bill-period').value = bill.period; document.getElementById('new-bill-date').value = bill.dueDate || '';
    editingBillId = id;
    const btn = document.getElementById('submit-bill-btn'); btn.innerHTML = `<i data-lucide="save"></i> Update Bill`; btn.classList.replace('bg-blue-600', 'bg-green-600'); document.getElementById('cancel-edit-btn').classList.remove('hidden');
    window.scrollTo({ top: 0, behavior: 'smooth' }); if (typeof lucide !== 'undefined') lucide.createIcons();
}
function cancelEditBill() {
    editingBillId = null; document.getElementById('new-bill-name').value = ''; document.getElementById('new-bill-amount').value = ''; document.getElementById('new-bill-period').value = '1'; document.getElementById('new-bill-date').value = '';
    const btn = document.getElementById('submit-bill-btn'); btn.innerHTML = `<i data-lucide="plus-circle"></i> Add Bill`; btn.classList.replace('bg-green-600', 'bg-blue-600'); document.getElementById('cancel-edit-btn').classList.add('hidden'); if (typeof lucide !== 'undefined') lucide.createIcons();
}
function submitBill() {
    const name = document.getElementById('new-bill-name').value.trim(), amount = parseFloat(document.getElementById('new-bill-amount').value), period = parseInt(document.getElementById('new-bill-period').value), dueDateInput = document.getElementById('new-bill-date').value;
    const dueDate = dueDateInput ? parseInt(dueDateInput) : (period === 1 ? 1 : 16);
    if(name && !isNaN(amount) && amount > 0) {
        if(editingBillId) { const bill = appState.bills.find(b => b.id === editingBillId); if(bill) { bill.name = name; bill.amount = amount; bill.period = period; bill.dueDate = dueDate; } editingBillId = null; } 
        else { appState.bills.push({ id: 'b_' + Date.now(), name, amount, period, dueDate, paid: false }); }
        saveState(); cancelEditBill();
    }
}

function keypadPress(val) {
    if (val === 'DEL') { appState.keypadAmount = appState.keypadAmount.slice(0, -1); if (appState.keypadAmount === '') appState.keypadAmount = "0"; } 
    else if (val === '.') { if (!appState.keypadAmount.includes('.')) appState.keypadAmount += '.'; } 
    else { if (appState.keypadAmount === "0") appState.keypadAmount = val; else { if(appState.keypadAmount.includes('.') && appState.keypadAmount.split('.')[1].length >= 2) return; appState.keypadAmount += val; } }
    document.getElementById('keypad-display').innerText = '$' + appState.keypadAmount;
}

window.pendingExpense = null;
function saveExpense() {
    const amt = parseFloat(appState.keypadAmount);
    if(amt > 0) {
        const netHourly = 40.52; 
        const hoursAdded = (amt / netHourly).toFixed(1);
        const msgDiv = document.getElementById('logan-msg');
        msgDiv.innerHTML = `Yo! Are you sure you wanna drop <strong>${formatCurrency(amt)}</strong> right now?<br><br>That's <strong>${hoursAdded} hours</strong> of sweating on the rig. Shouldn't we be putting that cash toward the August camping trip?`;
        window.pendingExpense = amt;
        document.getElementById('logan-modal').classList.remove('hidden');
    }
}

function confirmLogan(isSure) {
    document.getElementById('logan-modal').classList.add('hidden');
    if(isSure && window.pendingExpense) {
        appState.expenses.push({ id: Date.now(), category: appState.keypadCategory, amount: window.pendingExpense, date: new Date().toISOString() });
        appState.keypadAmount = "0"; saveState();
        const btn = document.getElementById('save-expense-btn'); const ogText = btn.innerHTML;
        btn.innerHTML = `<i data-lucide="check" class="w-6 h-6 inline"></i> Saved!`; btn.classList.add('bg-green-500'); if (typeof lucide !== 'undefined') lucide.createIcons();
        setTimeout(() => { btn.innerHTML = ogText; btn.classList.remove('bg-green-500'); if (typeof lucide !== 'undefined') lucide.createIcons(); document.getElementById('keypad-display').innerText = '$0'; }, 1500);

    const fixedDed = totalDays > 0 ? appState.payConfig.fixedDeductions : 0;
    const netPay = grossPay - taxDeduction - fixedDed + reimbursements;
    
    const today = new Date();
    const daysInMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
    const firstDayOfWeek = new Date(today.getFullYear(), today.getMonth(), 1).getDay();

    for(let i=0; i<firstDayOfWeek; i++) grid += `<div class="aspect-square"></div>`;

    return `

                <div><label class="text-xs opacity-70 block mb-1">Fixed Benefits ($)</label><input type="number" id="fixedDeductions" class="glass-input text-sm font-bold" value="${appState.payConfig.fixedDeductions}" onchange="updatePayConfig('fixedDeductions')"></div>

                <div class="flex justify-between font-bold opacity-90 border-b border-white/10 pb-2 mb-2"><span>Total Scheduled:</span> <span>${totalDays} Days</span></div>
                <div class="flex justify-between opacity-80"><span>Earnings (Gross):</span> <span>${formatCurrency(grossPay)}</span></div>
                <div class="flex justify-between text-red-400 opacity-80"><span>Taxes Withheld:</span> <span>-${formatCurrency(taxDeduction)}</span></div>
                <div class="flex justify-between text-red-400 opacity-80"><span>Post-Tax Ded:</span> <span>-${formatCurrency(fixedDed)}</span></div>
                <div class="flex justify-between text-green-400 opacity-80"><span>Reimbursements:</span> <span>+${formatCurrency(reimbursements)}</span></div>

    const name = prompt("Name your new project or part (e.g., Upgraded Injectors):");
    if(!name) return;
    const target = parseFloat(prompt("How much does it cost? ($)"));
    if(target > 0) { appState.garage.push({ id: 'g_' + Date.now(), name, target, saved: 0 }); saveState(); }
}
function fundGarageGoal(id) {
    const goal = appState.garage.find(g => g.id === id);
    if(goal) {
        const amt = parseFloat(prompt(`Add funds to ${goal.name} (Goal: ${formatCurrency(goal.target)}):`));
        if(amt > 0) { goal.saved += amt; saveState(); }
    }
}

function renderWealth() {
    if(!appState) return '';
    const sortedDebts = [...appState.debts].sort((a, b) => a.balance - b.balance);
    const totalDebt = appState.debts.reduce((sum, d) => sum + d.balance, 0);
    const totalIncome = appState.income.period1 + appState.income.period2;
    const totalBills = appState.bills.reduce((sum, b) => sum + b.amount, 0);
    const remainingIncome = totalIncome - totalBills;
    const suggestedPercent = 60; 
    const suggestedCheck = (remainingIncome * (suggestedPercent / 100)) / 2;
    const checksToZero = Math.ceil(totalDebt / suggestedCheck);

    return `
    <div id="tab-wealth" class="tab-content space-y-6 pb-10">
        <div class="glass-panel p-4 border-yellow-500/30 bg-gradient-to-br from-transparent to-yellow-900/10">
            <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold flex items-center gap-2"><i data-lucide="wrench" class="text-yellow-500"></i> The Garage</h2><button onclick="addGarageGoal()" class="text-xs font-bold text-yellow-400 bg-yellow-400/10 px-3 py-1 rounded-full"><i data-lucide="plus" class="w-3 h-3 inline"></i> New Part</button></div>
            <div class="space-y-5">
                ${appState.garage.map(g => {
                    let pct = (g.saved / g.target) * 100; if (pct > 100) pct = 100;
                    return `<div class="cursor-pointer active:scale-95 transition" onclick="fundGarageGoal('${g.id}')"><div class="flex justify-between text-sm font-bold mb-1"><span>${g.name}</span><span class="text-yellow-400">${formatCurrency(g.saved)} / ${formatCurrency(g.target)}</span></div><div class="relative w-full h-4 bg-black/40 rounded-full overflow-hidden border border-white/10 shadow-inner"><div class="absolute top-0 left-0 h-full bg-yellow-500 transition-all duration-700" style="width: ${pct}%"></div>${pct === 100 ? `<div class="absolute inset-0 flex items-center justify-center text-[10px] font-bold text-black uppercase tracking-widest">Ready to Order</div>` : ''}</div></div>`
                }).join('')}
            </div>
        </div>
        <div class="glass-panel p-4 bg-blue-500/10 border-blue-500/30">
            <h3 class="font-bold text-blue-400 mb-3 flex items-center gap-2"><i data-lucide="target"></i> Snowball Attack Plan</h3>
            <div class="text-sm space-y-2"><div class="flex justify-between"><span>Total Debt:</span> <strong>${formatCurrency(totalDebt)}</strong></div><div class="flex justify-between"><span>Free Income (After Bills):</span> <strong>${formatCurrency(remainingIncome)}</strong></div><hr class="border-white/10 my-3"><p class="leading-relaxed opacity-90">If you use <strong>${suggestedPercent}%</strong> of your free cash (${formatCurrency(suggestedCheck)} per check) to attack the lowest balances first...</p><div class="text-center bg-black/20 dark:bg-black/40 p-3 rounded-lg mt-3 shadow-inner"><span class="text-green-500 font-bold block text-lg">Debt Free in ${checksToZero} Paychecks!</span></div></div>
        </div>
        <div class="glass-panel p-4">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i data-lucide="flame"></i> Active Debts</h2>
            <div class="space-y-3 mb-6">
                ${sortedDebts.map((d, index) => `<div class="bg-black/5 dark:bg-white/5 p-3 rounded-xl border border-gray-200 dark:border-gray-700 relative overflow-hidden">${index === 0 ? '<div class="absolute top-0 right-0 bg-blue-500 text-white text-[10px] px-2 py-0.5 rounded-bl-lg font-bold shadow-md">CURRENT TARGET</div>' : ''}<div class="flex justify-between font-bold"><span>${d.name}</span><span>${formatCurrency(d.balance)}</span></div><div class="flex justify-between text-xs opacity-70 mt-1"><span>Min: ${formatCurrency(d.minPayment)}</span><span>Rate: ${d.interest}%</span></div></div>`).join('')}
            </div>
            <h3 class="font-bold text-sm mb-2 mt-6 border-t pt-4">Add Debt</h3>
            <div class="grid grid-cols-2 gap-2 mb-2"><input type="text" id="new-debt-name" placeholder="Name" class="glass-input col-span-2 text-sm"><input type="number" id="new-debt-balance" placeholder="Balance" class="glass-input text-sm"><input type="number" id="new-debt-int" placeholder="Interest %" class="glass-input text-sm"><input type="number" id="new-debt-min" placeholder="Min Payment" class="glass-input col-span-2 text-sm"></div><button onclick="addNewDebt()" class="w-full bg-gray-800 text-white font-bold py-3 rounded-xl mt-2 text-sm">Save Debt</button>
        </div>
    </div>`;
}

// BIND ALL FUNCTIONS GLOBALLY SO UI BUTTONS ALWAYS WORK
window.renderApp = function() {
    if(!appState) return;
    
    // Smooth Scroll Fix: Capture exact scroll position
    const currentScroll = window.scrollY;
    
    document.getElementById('app-container').innerHTML = `${renderDashboard()}${renderBills()}${renderKeypad()}${renderCalendar()}${renderWealth()}`;
    if (typeof lucide !== 'undefined') { lucide.createIcons(); }
    const activeNav = document.querySelector('.nav-btn.text-blue-500, .nav-btn.dark\\:text-blue-400, .nav-btn.scale-110');
    if(activeNav) { const tab = document.getElementById(`tab-${activeNav.dataset.target}`); if(tab) tab.classList.add('active'); }
    if(editingBillId) editBill(editingBillId);
    startGrindMeter();
    
    // Smooth Scroll Fix: Teleport back to exact scroll position
    window.scrollTo(0, currentScroll);
}

window.toggleTheme = toggleTheme; window.switchTab = switchTab; window.toggleBill = toggleBill; window.deleteBill = deleteBill; window.editBill = editBill; window.cancelEditBill = cancelEditBill; window.submitBill = submitBill; window.keypadPress = keypadPress; window.saveExpense = saveExpense; window.changeCategory = changeCategory; window.addNewDebt = addNewDebt; window.editAccount = editAccount; window.updateCampingTarget = updateCampingTarget; window.addCampingFunds = addCampingFunds; window.confirmLogan = confirmLogan; window.executePaydayRush = executePaydayRush; window.addGarageGoal = addGarageGoal; window.fundGarageGoal = fundGarageGoal; window.updatePayConfig = updatePayConfig; window.toggleWorkDay = toggleWorkDay; window.toggleHitch = toggleHitch;

// INITIATE DYNAMIC DOWNLOAD
initCloudState();
</script>
