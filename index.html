        const DRIVE_SCOPE = 'openid profile email https://www.googleapis.com/auth/drive.appdata';

        let tokenClient = null;

        const loadLocalState = () => {

        };

        // Start the app from local storage instead of Firebase/Firestore
        finishLoading();

        const formatMoney = (amount) => new Intl.NumberFormat('en-CA', { style: 'currency', currency: 'CAD' }).format(amount);

        const calculateNetPay = () => {
            if(!state) return 0;
            const days = state.payConfig.workDays.length;
            if (days === 0) return 0;
            const gross = days * state.payConfig.grossDaily;
            const taxFactor = 1 - (state.payConfig.taxRate / 100);
            return (gross * taxFactor) - state.payConfig.fixedDeductions + (days * state.payConfig.dailyReimbursements);
        };

        const calculateTotalBills = () => state ? state.bills.reduce((sum, bill) => sum + bill.amount, 0) : 0;

        const updateFirebaseState = async (newStateObj) => {
    state = { ...state, ...newStateObj };

    saveLocalState();

    try {
        if (googleAccessToken) {
            await window.backupToGoogleDrive();
        }
    } catch (error) {
        console.error('Auto backup failed:', error);
    }

    triggerRender();
};

        // ----------------------------------------------------
        // GOOGLE DRIVE BACKUP / RESTORE
        // ----------------------------------------------------
        const setDriveStatus = (message) => {
            driveStatus = message;
            triggerRender();
        };

        const updateGoogleUserName = async (accessToken) => {
            try {
                const response = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                    headers: { Authorization: `Bearer ${accessToken}` }
                });

                if (!response.ok) return;

                const profile = await response.json();
                const firstName = (profile.given_name || profile.name || '').trim().split(' ')[0];

                if (firstName) {
                    signedInUserName = firstName;
                    localStorage.setItem('lumina-google-user-name', signedInUserName);
                }
            } catch (error) {
                console.warn('Could not load Google profile name:', error);
            }
        };

        const initGoogleTokenClient = () => {
            if (tokenClient) return tokenClient;

            if (!window.google?.accounts?.oauth2) {
                throw new Error('Google Sign-In library has not loaded yet. Refresh and try again.');
            }

            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID,
                scope: DRIVE_SCOPE,
                callback: () => {}
            });

            return tokenClient;
        };

        const ensureDriveAccess = () => new Promise((resolve, reject) => {
            if (googleAccessToken) {
                resolve(googleAccessToken);
                return;
            }

            try {
                const client = initGoogleTokenClient();
                client.callback = (response) => {
                    if (response.error) {
                        reject(response);
                        return;
                    }
                    googleAccessToken = response.access_token;
                    updateGoogleUserName(googleAccessToken).finally(() => {
                        setDriveStatus(`Google Drive connected as ${signedInUserName}`);
                        resolve(googleAccessToken);
                    });
                };
                client.requestAccessToken({ prompt: 'consent' });
            } catch (error) {
                reject(error);
            }
        });

        const driveFetch = async (url, options = {}) => {
            const token = await ensureDriveAccess();
            const response = await fetch(url, {
                ...options,
                headers: {
                    Authorization: `Bearer ${token}`,
                    ...(options.headers || {})
                }
            });

            if (!response.ok) {
                const text = await response.text();
                throw new Error(`Google Drive error ${response.status}: ${text}`);
            }

            return response;
        };

        const findDriveBackupFile = async () => {
            if (driveFileId) return driveFileId;

            const query = encodeURIComponent(`name='${DRIVE_FILE_NAME}' and trashed=false`);
            const url = `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=${query}&fields=files(id,name,modifiedTime)`;
            const response = await driveFetch(url);
            const data = await response.json();

            if (data.files && data.files.length > 0) {
                driveFileId = data.files[0].id;
                localStorage.setItem('lumina-drive-file-id', driveFileId);
                return driveFileId;
            }

            return null;
        };

        const createMultipartBody = (metadata, jsonData) => {
            const boundary = 'lumina_drive_boundary_' + Date.now();
            const body =
                `--${boundary}\r\n` +
                `Content-Type: application/json; charset=UTF-8\r\n\r\n` +
                JSON.stringify(metadata) + `\r\n` +
                `--${boundary}\r\n` +
                `Content-Type: application/json; charset=UTF-8\r\n\r\n` +
                JSON.stringify(jsonData, null, 2) + `\r\n` +
                `--${boundary}--`;

            return { boundary, body };
        };

        window.connectGoogleDrive = async () => {
            try {
                setDriveStatus('Connecting to Google Drive...');
                await ensureDriveAccess();
                await findDriveBackupFile();
                setDriveStatus(driveFileId ? `Google Drive connected as ${signedInUserName}. Backup file found.` : `Google Drive connected as ${signedInUserName}. No backup file yet.`);
            } catch (error) {
                console.error(error);
                setDriveStatus('Google Drive connection failed');
                alert('Google Drive connection failed. Check OAuth setup and try again.');
            }
        };

        window.backupToGoogleDrive = async () => {
            try {
                setDriveStatus('Backing up to Google Drive...');
                const backupPayload = {
                    app: 'Lumina Finance',
                    version: 1,
                    lastUpdated: new Date().toISOString(),
                    state
                };

                const existingId = await findDriveBackupFile();
                const metadata = existingId
                    ? { name: DRIVE_FILE_NAME }
                    : { name: DRIVE_FILE_NAME, parents: ['appDataFolder'] };
                const { boundary, body } = createMultipartBody(metadata, backupPayload);

                let url;
                let method;
                if (existingId) {
                    url = `https://www.googleapis.com/upload/drive/v3/files/${existingId}?uploadType=multipart`;
                    method = 'PATCH';
                } else {
                    url = 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id';
                    method = 'POST';
                }

                const response = await driveFetch(url, {
                    method,
                    headers: { 'Content-Type': `multipart/related; boundary=${boundary}` },
                    body
                });

                const result = await response.json();
                if (result.id) {
                    driveFileId = result.id;
                    localStorage.setItem('lumina-drive-file-id', driveFileId);
                }

                setDriveStatus('Backup saved to Google Drive');
                alert('Lumina backup saved to your Google Drive.');
            } catch (error) {
                console.error(error);
                setDriveStatus('Backup failed');
                alert('Backup failed. Open the console for details or check Google Drive permissions.');
            }
        };

        window.restoreFromGoogleDrive = async () => {
            try {
                const confirmed = confirm('Restore from Google Drive? This will replace the data currently stored on this device.');
                if (!confirmed) return;
             

                setDriveStatus('Restoring from Google Drive...');
                const existingId = await findDriveBackupFile();

                if (!existingId) {
                    setDriveStatus('No Google Drive backup found');
                    alert('No Lumina backup file was found in your Google Drive yet.');
                    return;
                }

                const response = await driveFetch(`https://www.googleapis.com/drive/v3/files/${existingId}?alt=media`);
                const backupPayload = await response.json();
                const restoredState = backupPayload.state || backupPayload;

                if (!restoredState.accounts || !restoredState.bills || !restoredState.debts) {
                    throw new Error('Backup file does not look like valid Lumina data.');
                }

                state = restoredState;
                saveLocalState();
                setDriveStatus('Restored from Google Drive');
                triggerRender();
                alert('Lumina data restored from Google Drive.');
            } catch (error) {
                console.error(error);
                setDriveStatus('Restore failed');
                alert('Restore failed. The backup may be missing or invalid.');
            }
        };

            if (!state) return;
            
            // Auto-migrate new accounts & goals for existing users smoothly

};

const projectedHitchPay =

    Number(oilfield.travelPay || 0) +
    Number(oilfield.bonusPay || 0);
            
            // Safety nets for missing data
            const camping = state.goals?.["August Camping Trip"] || { target: 1500, saved: 0 };

            const rbcCheq = Number(state.accounts["RBC Chequing"]) || 0;

                                        <i data-lucide="tent" class="w-5 h-5"></i> Yeah, save it for Camp
                                    </button>
                                    <button onclick="window.handleRealityCheck('spend')" class="w-full py-3.5 rounded-xl bg-slate-800 text-slate-300 font-semibold border border-slate-700 active:scale-95 transition-transform">
                                        Nah, I'm buying it
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            // 2. Dynamic Edit Modal
            if (uiState.showEditModal) {
                const isDebt = uiState.editType === 'debt';
                const isGoal = uiState.editType === 'goal';
                const isAccount = uiState.editType === 'account';
                const isInvestment = uiState.editType === 'investment';
                
                const titleText = isDebt ? 'Debt' : isGoal ? 'Goal' : isAccount ? 'Account' : isInvestment ? 'Investment' : 'Expense / Bill';
                
                html += `
                    <div class="fixed inset-0 z-[100] flex items-center justify-center px-4 bg-slate-900/80 backdrop-blur-xl transition-opacity duration-300">
                        <div class="glass-panel rounded-3xl w-full max-w-sm border border-slate-600 p-6 shadow-2xl transform scale-100 transition-transform duration-300">
                            <h3 class="text-xl font-bold text-white mb-4 flex items-center gap-2">
                                <i data-lucide="edit-3" class="w-5 h-5 text-brand-accent"></i> 
                                Edit ${titleText}
                            </h3>
                            <div class="space-y-4 mb-6">
                                <div>
                                    <label class="block text-xs text-slate-400 mb-2 uppercase tracking-wider">Name</label>
                                    <input type="text" id="edit-name-input" class="w-full bg-slate-800/50 text-white rounded-xl py-3 px-4 border border-slate-600 focus:border-brand-accent focus:ring-1 focus:ring-brand-accent outline-none font-semibold ${isAccount || isInvestment ? 'opacity-50 cursor-not-allowed' : ''}" value="${uiState.editName}" ${isAccount || isInvestment ? 'readonly' : ''}>
                                </div>
                                <div>
                                    <label class="block text-xs text-slate-400 mb-2 uppercase tracking-wider">${isGoal ? 'Target Amount' : isAccount ? 'Balance' : isInvestment ? 'Monthly Contribution' : 'Amount / Balance'}</label>
                                    <div class="relative">
                                        <span class="absolute left-4 top-3 text-slate-400 font-medium">$</span>
                                        <input type="number" id="edit-amount-input" class="w-full bg-slate-800/50 text-white rounded-xl py-3 pl-8 pr-4 border border-slate-600 focus:border-brand-accent focus:ring-1 focus:ring-brand-accent outline-none font-semibold" value="${uiState.editAmount}" step="0.01">
                                    </div>
                                </div>
                                ${isGoal ? `
                                <div>
                                    <label class="block text-xs text-slate-400 mb-2 uppercase tracking-wider text-brand-accent">Current Saved</label>
                                    <div class="relative">
                                        <span class="absolute left-4 top-3 text-brand-accent font-medium">$</span>
                                        <input type="number" id="edit-saved-input" class="w-full bg-slate-800/50 text-brand-accent rounded-xl py-3 pl-8 pr-4 border border-brand-accent/50 focus:border-brand-accent focus:ring-1 focus:ring-brand-accent outline-none font-semibold" value="${uiState.editSavedAmount}" step="0.01">
                                    </div>
                                </div>
                                ` : ''}
                                ${isDebt ? `
                                <div>
                                    <label class="block text-xs text-slate-400 mb-2 uppercase tracking-wider">Minimum Payment</label>
                                    <div class="relative">
                                        <span class="absolute left-4 top-3 text-slate-400 font-medium">$</span>
                                        <input type="number" id="edit-minpay-input" class="w-full bg-slate-800/50 text-white rounded-xl py-3 pl-8 pr-4 border border-slate-600 focus:border-brand-accent focus:ring-1 focus:ring-brand-accent outline-none font-semibold" value="${uiState.editMinPayment}" step="0.01">
                                    </div>
                                </div>
                                ` : ''}
                            </div>
                            <div class="flex gap-3">
                                ${uiState.editType === 'bill' && String(uiState.editId).startsWith('exp_') ? `
                                    <button onclick="window.deleteEdit()" class="px-4 py-3.5 rounded-xl bg-red-500/10 text-red-400 font-semibold border border-red-500/20 active:scale-95 transition-transform flex items-center justify-center">
                                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                                    </button>
                                ` : ''}
                                <button onclick="window.closeEdit()" class="flex-1 py-3.5 rounded-xl bg-slate-800 text-slate-300 font-semibold border border-slate-700 active:scale-95 transition-transform">
                                    Cancel
                                </button>
                                <button onclick="window.saveEdit()" class="flex-1 py-3.5 rounded-xl bg-brand-accent text-white font-bold shadow-lg shadow-emerald-500/20 active:scale-95 transition-transform">
                                    Save
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

        if (uiState.showOilfieldModal) {
    const oilfield = state.oilfield || {
        hitchStart: "",
        hitchLength: 24,
        daysOff: 14,
        loaDaily: 85.72,
        travelPay: 0,
        bonusPay: 0
    };

    html += `
        <div class="fixed inset-0 z-[100] flex items-center justify-center px-4 bg-slate-900/80 backdrop-blur-xl">
            <div class="glass-panel rounded-3xl w-full max-w-sm border border-slate-600 p-6 shadow-2xl">
                <h3 class="text-xl font-bold text-white mb-1 flex items-center gap-2">
                    <i data-lucide="truck" class="w-5 h-5 text-brand-accent"></i>
                    Oilfield Settings
                </h3>
                <p class="text-xs text-slate-400 mb-5">Set your hitch schedule and pay extras.</p>

                <div class="space-y-4 mb-6">
                    <div>
                        <label class="block text-xs text-slate-400 mb-2 uppercase tracking-wider">Hitch Length</label>
                        <select id="oilfield-hitch-length" class="w-full bg-slate-800/50 text-white rounded-xl py-3 px-4 border border-slate-600 outline-none">
                            <option value="14" ${oilfield.hitchLength == 14 ? 'selected' : ''}>14 Days</option>
                            <option value="21" ${oilfield.hitchLength == 21 ? 'selected' : ''}>21 Days</option>
                            <option value="24" ${oilfield.hitchLength == 24 ? 'selected' : ''}>24 Days</option>
                            <option value="28" ${oilfield.hitchLength == 28 ? 'selected' : ''}>28 Days</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs text-slate-400 mb-2 uppercase tracking-wider">Days Off</label>
                        <select id="oilfield-days-off" class="w-full bg-slate-800/50 text-white rounded-xl py-3 px-4 border border-slate-600 outline-none">
                            <option value="7" ${oilfield.daysOff == 7 ? 'selected' : ''}>7 Days</option>
                            <option value="14" ${oilfield.daysOff == 14 ? 'selected' : ''}>14 Days</option>
                            <option value="18" ${oilfield.daysOff == 18 ? 'selected' : ''}>18 Days</option>
                            <option value="21" ${oilfield.daysOff == 21 ? 'selected' : ''}>21 Days</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs text-slate-400 mb-2 uppercase tracking-wider">Hitch Start Date</label>
                        <input id="oilfield-hitch-start" type="date" value="${oilfield.hitchStart || ''}" class="w-full bg-slate-800/50 text-white rounded-xl py-3 px-4 border border-slate-600 outline-none">
                    </div>

                    <div>
                        <label class="block text-xs text-slate-400 mb-2 uppercase tracking-wider">LOA Per Day</label>
                        <input id="oilfield-loa-daily" type="number" step="0.01" value="${oilfield.loaDaily}" class="w-full bg-slate-800/50 text-white rounded-xl py-3 px-4 border border-slate-600 outline-none">
                    </div>

                    <div>
                        <label class="block text-xs text-slate-400 mb-2 uppercase tracking-wider">Travel Pay</label>
                        <input id="oilfield-travel-pay" type="number" step="0.01" value="${oilfield.travelPay || 0}" class="w-full bg-slate-800/50 text-white rounded-xl py-3 px-4 border border-slate-600 outline-none">
                    </div>

                    <div>
                        <label class="block text-xs text-slate-400 mb-2 uppercase tracking-wider">Bonus Pay</label>
                        <input id="oilfield-bonus-pay" type="number" step="0.01" value="${oilfield.bonusPay || 0}" class="w-full bg-slate-800/50 text-white rounded-xl py-3 px-4 border border-slate-600 outline-none">
                    </div>
                </div>

                <div class="flex gap-3">
                    <button onclick="window.closeOilfieldSettings()" class="flex-1 py-3.5 rounded-xl bg-slate-800 text-slate-300 font-semibold border border-slate-700">
                        Cancel
                    </button>
                    <button onclick="window.saveOilfieldSettings()" class="flex-1 py-3.5 rounded-xl bg-brand-accent text-white font-bold">
                        Save
                    </button>
                </div>
            </div>
        </div>
    `;
}    return html;
        };

        // ----------------------------------------------------
        // EVENT HANDLERS
        // ----------------------------------------------------
        
        window.switchTab = (tab) => {
            if (currentTab === tab) return;
            currentTab = tab;
            triggerRender();
        };

        window.toggleDay = (day) => {
            let newDays = [...state.payConfig.workDays];
            if (newDays.includes(day)) {
                newDays = newDays.filter(d => d !== day);
            } else {
                newDays.push(day);
            }
            updateFirebaseState({ payConfig: { ...state.payConfig, workDays: newDays } });
        };

        window.toggleBill = (id) => {
            const newBills = state.bills.map(b => b.id === id ? { ...b, paid: !b.paid } : b);
            updateFirebaseState({ bills: newBills });
        };

        window.paydayRush = (periodNum) => {
            let deductionAmount = 0;
            const newBills = state.bills.map(b => {
                if (b.period === periodNum && !b.paid) {
                    deductionAmount += b.amount;
                    return { ...b, paid: true };
                }
                return b;
            });
            const newRbcBalance = state.accounts["RBC Chequing"] - deductionAmount;
            updateFirebaseState({
                bills: newBills,
                accounts: { ...state.accounts, "RBC Chequing": newRbcBalance }
            });
        };

        // Update the Expense Form state dynamically
        window.updateExpData = (field, val) => {
            if(field === 'name') uiState.expenseName = val;
            if(field === 'date') uiState.expenseDate = val;
            if(field === 'period') uiState.expensePeriod = parseInt(val);
        };

        window.keypadPress = (val) => {
            if (val === 'DEL') {
                uiState.keypadValue = uiState.keypadValue.length > 1 ? uiState.keypadValue.slice(0, -1) : '0';
            } else {
                if (uiState.keypadValue === '0' && val !== '00') {
                    uiState.keypadValue = val;
                } else if (uiState.keypadValue !== '0') {
                    if(uiState.keypadValue.length < 8) uiState.keypadValue += val;
                }
            }
            triggerRender();
        };

        window.submitExpense = () => {
            const amount = parseInt(uiState.keypadValue) / 100;
            if (amount <= 0) return;

            if (amount > 50) {
                uiState.pendingExpenseAmount = amount;
                uiState.showRealityCheck = true;
                triggerRender();
            } else {
                // If it's small, skip the text message and just buy it
                window.handleRealityCheck('spend_auto');
            }
        };

        window.handleRealityCheck = (choice) => {
            const amount = uiState.pendingExpenseAmount > 0 ? uiState.pendingExpenseAmount : (parseInt(uiState.keypadValue) / 100);
            let updates = {};

            if (choice === 'save') {
                // FIX: Safely access current saved amount
                const currentSaved = state.goals?.["August Camping Trip"]?.saved || 0;
                const currentTarget = state.goals?.["August Camping Trip"]?.target || 1500;
                
                updates = {
                    accounts: { ...state.accounts, "RBC Chequing": state.accounts["RBC Chequing"] - amount },
                    goals: { 
                        ...state.goals, 
                        "August Camping Trip": { target: currentTarget, saved: currentSaved + amount } 
                    }
                };
            } else {
                // Spend it - Deduct from RBC AND add to the Bills list as a receipt!
                const newBill = {
                    id: 'exp_' + Date.now(),
                    name: uiState.expenseName || 'Ad-hoc Expense',
                    amount: amount,
                    period: uiState.expensePeriod,
                    paid: true, // Mark it as already paid so it doesn't add to unpaid totals
                    date: uiState.expenseDate
                };

                updates = {
                    accounts: { ...state.accounts, "RBC Chequing": state.accounts["RBC Chequing"] - amount },
                    bills: [...state.bills, newBill]
                };
            }

            // Reset UI
            uiState.showRealityCheck = false;
            uiState.pendingExpenseAmount = 0;
            uiState.keypadValue = '0';
            uiState.expenseName = ''; 
            currentTab = 'bills'; // Jump to bills to show them the receipt
            
            updateFirebaseState(updates);
        };

        // ----------------------------------------------------
        // EDIT CONTROLLERS
        // ----------------------------------------------------
        window.openEdit = (type, idOrName) => {
            uiState.editType = type;
            uiState.editId = idOrName;
            
            if (type === 'bill') {
                const bill = state.bills.find(b => b.id === idOrName);
                if(bill) {
                    uiState.editName = bill.name;
                    uiState.editAmount = bill.amount;
                }
            } else if (type === 'debt') {
                const debt = state.debts.find(d => d.id === idOrName);
                if(debt) {
                    uiState.editName = debt.name;
                    uiState.editAmount = debt.balance;
                    uiState.editMinPayment = debt.minPayment;
                }
            } else if (type === 'goal') {
                const targetObj = state.goals?.[idOrName] || state.garage?.[idOrName];
                if(targetObj) {
                    uiState.editName = idOrName;
                    uiState.editAmount = targetObj.target;
                    uiState.editSavedAmount = targetObj.saved || 0;
                }
            } else if (type === 'account') {
                const accVal = state.accounts[idOrName];
                if(accVal !== undefined) {
                    uiState.editName = idOrName;
                    uiState.editAmount = accVal;
                }
            } else if (type === 'investment') {
                uiState.editName = idOrName;
                const netPay = calculateNetPay();
                const totalBills = calculateTotalBills();
                const surplus = Math.max(0, netPay - totalBills);
                uiState.editAmount = state.investmentContribution !== null && state.investmentContribution !== undefined ? state.investmentContribution : surplus;
            }
            
            uiState.showEditModal = true;
            triggerRender();
        };

        window.closeEdit = () => {
            uiState.showEditModal = false;
            triggerRender();
        };

        window.deleteEdit = () => {
            if (uiState.editType === 'bill') {
                const bill = state.bills.find(b => b.id === uiState.editId);
                let updates = {};
                
                if (bill) {
                    updates.bills = state.bills.filter(b => b.id !== uiState.editId);
                    
                    // If the expense was already deducted, refund it!
                    if (bill.paid) {
                        updates.accounts = { 
                            ...state.accounts, 
                            "RBC Chequing": state.accounts["RBC Chequing"] + bill.amount 
                        };
                    }
                    
                    uiState.showEditModal = false;
                    updateFirebaseState(updates);
                }
            }
        };

        window.saveEdit = () => {
            const nameInput = document.getElementById('edit-name-input').value;
            const amountInput = parseFloat(document.getElementById('edit-amount-input').value);
            
            let updates = {};

            if (uiState.editType === 'bill') {
                if (nameInput && !isNaN(amountInput)) {
                    updates.bills = state.bills.map(b => 
                        b.id === uiState.editId ? { ...b, name: nameInput, amount: amountInput } : b
                    );
                }
            } else if (uiState.editType === 'debt') {
                const minPayInput = parseFloat(document.getElementById('edit-minpay-input').value);
                if (nameInput && !isNaN(amountInput) && !isNaN(minPayInput)) {
                    updates.debts = state.debts.map(d => 
                        d.id === uiState.editId ? { ...d, name: nameInput, balance: amountInput, minPayment: minPayInput } : d
                    );
                }
            } else if (uiState.editType === 'goal') {
                const savedAmountInput = parseFloat(document.getElementById('edit-saved-input').value);
                if (nameInput && !isNaN(amountInput) && !isNaN(savedAmountInput)) {
                    // Check if it's an old garage item or a goal
                    if (state.garage?.[uiState.editId]) {
                        const newGarage = { ...state.garage };
                        delete newGarage[uiState.editId]; 
                        newGarage[nameInput] = { target: amountInput, saved: savedAmountInput };
                        updates.garage = newGarage;
                    } else if (state.goals?.[uiState.editId]) {
                        const newGoals = { ...state.goals };
                        delete newGoals[uiState.editId];
                        newGoals[nameInput] = { target: amountInput, saved: savedAmountInput };
                        updates.goals = newGoals;
                    }
                }
            } else if (uiState.editType === 'account') {
                if (!isNaN(amountInput)) {
                    updates.accounts = { ...state.accounts, [uiState.editId]: amountInput };
                }
            } else if (uiState.editType === 'investment') {
                if (!isNaN(amountInput)) {
                    updates.investmentContribution = amountInput;
                }
            }

            uiState.showEditModal = false;
            if (Object.keys(updates).length > 0) {
                updateFirebaseState(updates);
            } else {
                triggerRender(); // Close without saving if inputs were invalid
            }
        };

        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
        });

    </script>
    <script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
            .then(registration => {
                console.log('Service Worker Registered');
            })
            .catch(error => {
                console.log('Service Worker Registration Failed:', error);
            });
    });
}
</script>
</body>
</html>
