<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="./manifest.webmanifest">
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumina Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: { dark: '#0f2027', mid: '#203a43', light: '#2c5364', accent: '#10b981' } } }, fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'], } }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); background-attachment: fixed; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        .glass-panel { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        ::-webkit-scrollbar { display: none; }
        .key-press:active { transform: scale(0.95); background: rgba(255,255,255,0.2); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .message-tail { position: absolute; bottom: 0; left: -8px; width: 20px; height: 20px; background-color: #26252a; border-bottom-right-radius: 16px; z-index: -1; }
        .message-tail::after { content: ""; position: absolute; bottom: 0; left: -10px; width: 20px; height: 20px; background-color: #1c1c1e; border-bottom-right-radius: 16px; }
        /* Voice Pulse Animation */
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        .listening { animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; background-color: #10b981 !important; color: white !important; }
    </style>
</head>
<body class="text-white min-h-screen font-sans antialiased overflow-x-hidden selection:bg-brand-accent selection:text-white">

    <main id="app-content" class="pb-32 pt-6 px-4 max-w-lg mx-auto min-h-screen"></main>

    <nav class="fixed bottom-0 w-full glass-panel border-t border-white/10 z-50 rounded-t-3xl pb-safe">
        <div class="flex justify-around items-end max-w-lg mx-auto px-2 pt-2 pb-2 relative">
            <button onclick="window.switchTab('dash')" class="nav-btn flex flex-col items-center p-2 text-slate-400 transition-colors w-16" data-tab="dash">
                <i data-lucide="layout-dashboard" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-medium tracking-wide">Dash</span>
            </button>
            <button onclick="window.switchTab('bills')" class="nav-btn flex flex-col items-center p-2 text-slate-400 transition-colors w-16" data-tab="bills">
                <i data-lucide="receipt" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-medium tracking-wide">Bills</span>
            </button>
            <div class="relative w-16 flex justify-center h-full">
                <button onclick="window.switchTab('keypad')" class="absolute bottom-4 w-16 h-16 bg-brand-accent rounded-full flex items-center justify-center shadow-lg shadow-emerald-500/40 border-4 border-[#203a43] text-white transform transition-transform active:scale-95 z-50">
                    <i data-lucide="calculator" class="w-7 h-7"></i>
                </button>
            </div>
            <button onclick="window.switchTab('plan')" class="nav-btn flex flex-col items-center p-2 text-slate-400 transition-colors w-16" data-tab="plan">
                <i data-lucide="calendar-days" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-medium tracking-wide">Plan</span>
            </button>
            <button onclick="window.switchTab('wealth')" class="nav-btn flex flex-col items-center p-2 text-slate-400 transition-colors w-16" data-tab="wealth">
                <i data-lucide="landmark" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-medium tracking-wide">Accounts</span>
            </button>
        </div>
    </nav>

    <div id="loader" class="fixed inset-0 bg-[#0f2027] z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <i data-lucide="loader-2" class="w-12 h-12 text-brand-accent animate-spin mb-4"></i>
        <h1 class="text-2xl font-light tracking-widest text-white">LUMINA</h1>
    </div>

    <script type="module">
        const DEFAULT_STATE = {
            accounts: { "RBC Chequing": 2500, "RBC Savings": 10000, "Wealthsimple TFSA": 0, "Wealthsimple RRSP": 0 },
            payConfig: { grossDaily: 601.87, taxRate: 32.07, dailyReimbursements: 85.72, fixedDeductions: 132.94, workDays: [] },
            bills: [
                { id: "b1", name: "Internet", amount: 185.00, period: 1, paid: false },
                { id: "b12", name: "Rent", amount: 2400.00, period: 2, paid: false },
                { id: "b17", name: "Daycare", amount: 473.00, period: 2, paid: false },
                { id: "b18", name: "Child Support", amount: 545.50, period: 2, paid: false }
            ],
            // PHASE 1: New Subscriptions Array
            subscriptions: [
                { id: "s1", name: "Netflix", amount: 22.99, active: true },
                { id: "s2", name: "Spotify", amount: 11.99, active: true }
            ],
            debts: [{ id: "d1", name: "TD Loan", balance: 12000, minPayment: 404 }],
            goals: { "August Camping Trip": { target: 1500, saved: 0 }, "Emergency Fund": { target: 15000, saved: 0 } },
            oilfield: { hitchStart: "", hitchLength: 24, daysOff: 14, loaDaily: 85.72, travelPay: 0, bonusPay: 0 },
            garage: { "Ford 6.0L Bulletproof": { target: 6500, saved: 0 } },
            // PHASE 1: New Truck Maintenance & Fuel Log
            truckLogs: [
                { id: "t1", date: "2026-05-15", type: "Fuel", amount: 145.50, notes: "Jasper Run" }
            ]
        };

        let state = null; 
        let currentTab = 'dash';
        
        const uiState = {
            keypadValue: '0', showRealityCheck: false, pendingExpenseAmount: 0, expenseName: '',
            expenseDate: new Date().toISOString().split('T')[0], expensePeriod: 1,
            showEditModal: false, showOilfieldModal: false, editType: '', editId: null,
            editName: '', editAmount: 0, editMinPayment: 0, editSavedAmount: 0, isListening: false
        };

        const STORAGE_KEY = 'lumina-finance-data';

        const sanitizeState = (raw) => {
            let clean = JSON.parse(JSON.stringify(DEFAULT_STATE));
            if (!raw) return clean;
            if (raw.accounts) clean.accounts = { ...clean.accounts, ...raw.accounts };
            if (raw.payConfig) { clean.payConfig = { ...clean.payConfig, ...raw.payConfig }; if (!Array.isArray(clean.payConfig.workDays)) clean.payConfig.workDays = []; }
            if (Array.isArray(raw.bills)) clean.bills = raw.bills;
            if (Array.isArray(raw.subscriptions)) clean.subscriptions = raw.subscriptions;
            if (Array.isArray(raw.debts)) clean.debts = raw.debts;
            if (Array.isArray(raw.truckLogs)) clean.truckLogs = raw.truckLogs;
            if (raw.goals) clean.goals = { ...clean.goals, ...raw.goals };
            if (raw.garage) clean.garage = { ...clean.garage, ...raw.garage };
            if (raw.oilfield) clean.oilfield = { ...clean.oilfield, ...raw.oilfield };
            return clean;
        };

        const loadLocalState = () => {
            const saved = localStorage.getItem(STORAGE_KEY);
            state = sanitizeState(saved ? JSON.parse(saved) : null);
        };

        const saveLocalState = () => { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); };

        loadLocalState();

        const finishLoading = () => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; triggerRender(); }, 500);
        };
        finishLoading();

        const formatMoney = (amount) => new Intl.NumberFormat('en-CA', { style: 'currency', currency: 'CAD' }).format(amount);

        const calculateNetPay = () => {
            if(!state) return 0;
            const days = state.payConfig.workDays.length;
            if (days === 0) return 0;
            const gross = days * state.payConfig.grossDaily;
            const taxFactor = 1 - (state.payConfig.taxRate / 100);
            const loaDaily = state.oilfield?.loaDaily !== undefined ? state.oilfield.loaDaily : state.payConfig.dailyReimbursements;
            const loa = days * loaDaily;
            const travel = days > 0 ? Number(state.oilfield?.travelPay || 0) : 0;
            const bonus = days > 0 ? Number(state.oilfield?.bonusPay || 0) : 0;
            return (gross * taxFactor) - state.payConfig.fixedDeductions + loa + travel + bonus;
        };

        const calculateTotalBills = () => {
            if(!state) return 0;
            const baseBills = state.bills.reduce((sum, bill) => sum + bill.amount, 0);
            const subs = state.subscriptions.filter(s => s.active).reduce((sum, sub) => sum + sub.amount, 0);
            return baseBills + subs;
        };

        const updateFirebaseState = async (newStateObj) => {
            state = sanitizeState({ ...state, ...newStateObj });
            saveLocalState();
            triggerRender();
        };

        // ----------------------------------------------------
        // VOICE INPUT ENGINE (Web Speech API)
        // ----------------------------------------------------
        window.toggleVoiceInput = () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Voice input is not supported in this browser yet. Try Chrome or Safari.");
                return;
            }

            if (uiState.isListening) return; // Prevent double clicks

            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                uiState.isListening = true;
                triggerRender();
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript.toLowerCase();
                console.log("Heard:", transcript);
                
                // Very basic parsing logic for Phase 1
                const numbers = transcript.match(/\d+(\.\d{1,2})?/g);
                if (numbers && numbers.length > 0) {
                    const amount = parseFloat(numbers[0]);
                    uiState.keypadValue = (amount * 100).toString(); // Convert to cents for keypad logic
                    uiState.expenseName = transcript.replace(numbers[0], '').trim();
                    alert(`Heard: ${uiState.expenseName} for $${amount}`);
                } else {
                    alert("Couldn't catch a dollar amount. Please try again.");
                }
            };

            recognition.onerror = (event) => {
                console.error("Speech error:", event.error);
                alert("Microphone error. Please ensure permissions are granted.");
            };

            recognition.onend = () => {
                uiState.isListening = false;
                triggerRender();
            };

            recognition.start();
        };


        const triggerRender = () => {
            if (!state) return;
            const scrollPos = window.scrollY;
            const appDiv = document.getElementById('app-content');
            let html = '';

            switch(currentTab) {
                case 'dash': html = renderDash(); break;
                case 'bills': html = renderBills(); break;
                case 'keypad': html = renderKeypad(); break;
                case 'plan': html = renderPlan(); break;
                case 'wealth': html = renderWealth(); break;
            }

            html += renderModals();
            appDiv.innerHTML = html;
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-brand-accent');
                btn.classList.add('text-slate-400');
                if(btn.dataset.tab === currentTab) {
                    btn.classList.add('text-brand-accent');
                    btn.classList.remove('text-slate-400');
                }
            });

            lucide.createIcons();
            window.scrollTo(0, scrollPos);
        };

        const renderDash = () => {
            const netPay = calculateNetPay();
            const totalBills = calculateTotalBills();
            const surplus = netPay - totalBills;
            const rbcCheq = Number(state.accounts["RBC Chequing"]) || 0;

            return `
                <header class="mb-8 flex justify-between items-center">
                    <div>
                        <h1 class="text-3xl font-bold tracking-tight text-white">Lumina</h1>
                        <p class="text-brand-accent text-sm font-medium tracking-wider">Welcome, Austin</p>
                    </div>
                </header>

                <section class="glass-panel rounded-3xl p-6 mb-6 relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-brand-accent/20 rounded-full blur-3xl -mr-10 -mt-10"></div>
                    <h2 class="text-slate-400 text-sm font-medium uppercase tracking-widest mb-1">Live Projected Net</h2>
                    <div class="text-5xl font-light text-white tracking-tighter mb-4">${formatMoney(netPay)}</div>
                    
                    <div class="bg-slate-900/50 rounded-xl p-4 border border-white/5 flex items-start gap-3">
                        <i data-lucide="sparkles" class="w-5 h-5 text-amber-400 mt-0.5 flex-shrink-0"></i>
                        <div>
                            <p class="text-sm text-slate-300 leading-relaxed">
                                Projected Net minus total monthly bills (${formatMoney(totalBills)}) results in a 
                                <strong class="${surplus >= 0 ? 'text-brand-accent' : 'text-red-400'}">
                                    ${surplus >= 0 ? '+' : ''}${formatMoney(surplus)} ${surplus >= 0 ? 'Surplus' : 'Shortfall'}
                                </strong>.
                            </p>
                        </div>
                    </div>
                </section>
                
                <div class="glass-panel rounded-2xl p-4 mb-6">
                    <p class="text-xs text-slate-400 mb-1">RBC Chequing Balance</p>
                    <p class="text-2xl font-semibold text-blue-400">${formatMoney(rbcCheq)}</p>
                </div>
            `;
        };

        const renderBills = () => {
            const period1 = state.bills.filter(b => b.period === 1);
            const period2 = state.bills.filter(b => b.period === 2);
            
            const renderBillItem = (bill) => `
                <div class="flex items-center justify-between p-4 border-b border-white/5 last:border-0 hover:bg-white/5 transition-colors cursor-pointer group" onclick="window.toggleBill('${bill.id}')">
                    <div class="flex items-center gap-4 flex-1">
                        <div class="w-6 h-6 rounded border ${bill.paid ? 'bg-brand-accent border-brand-accent text-white' : 'border-slate-500 flex items-center justify-center'} transition-colors flex-shrink-0">
                            ${bill.paid ? '<i data-lucide="check" class="w-4 h-4 mx-auto mt-1"></i>' : ''}
                        </div>
                        <div>
                            <p class="font-medium ${bill.paid ? 'text-slate-400 line-through' : 'text-white'}">${bill.name}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="font-semibold ${bill.paid ? 'text-slate-500' : 'text-slate-200'}">${formatMoney(bill.amount)}</span>
                        <button onclick="event.stopPropagation(); window.openEdit('bill', '${bill.id}')" class="p-2 -mr-2 text-slate-500 hover:text-white transition-colors">
                            <i data-lucide="edit-3" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            `;

            const renderPeriodCard = (title, items) => {
                const totalUnpaid = items.filter(b=>!b.paid).reduce((sum, b) => sum + b.amount, 0);
                return `
                <section class="glass-panel rounded-3xl overflow-hidden mb-6">
                    <div class="p-4 bg-slate-900/40 border-b border-white/10 flex justify-between items-center">
                        <h2 class="text-lg font-semibold flex items-center gap-2"><i data-lucide="calendar" class="w-5 h-5 text-blue-400"></i> ${title}</h2>
                        <span class="text-sm font-medium text-slate-300">Unpaid: ${formatMoney(totalUnpaid)}</span>
                    </div>
                    <div class="flex flex-col">${items.map(renderBillItem).join('')}</div>
                </section>
                `;
            };

            // PHASE 1: Subscriptions Tracker Render
            const renderSubscriptions = () => {
                const activeSubs = state.subscriptions.filter(s => s.active);
                const totalSubs = activeSubs.reduce((sum, s) => sum + s.amount, 0);
                return `
                <section class="glass-panel rounded-3xl overflow-hidden mb-6 border-indigo-500/20">
                    <div class="p-4 bg-indigo-900/20 border-b border-white/10 flex justify-between items-center">
                        <h2 class="text-lg font-semibold flex items-center gap-2"><i data-lucide="repeat" class="w-5 h-5 text-indigo-400"></i> Subscriptions</h2>
                        <span class="text-sm font-medium text-slate-300">Monthly: ${formatMoney(totalSubs)}</span>
                    </div>
                    <div class="flex flex-col">
                        ${activeSubs.map(sub => `
                            <div class="flex items-center justify-between p-4 border-b border-white/5 last:border-0">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-full bg-indigo-500/20 text-indigo-400 flex items-center justify-center border border-indigo-500/30">
                                        <i data-lucide="play-square" class="w-4 h-4"></i>
                                    </div>
                                    <p class="font-medium text-white">${sub.name}</p>
                                </div>
                                <div class="flex items-center gap-3">
                                    <span class="font-semibold text-slate-200">${formatMoney(sub.amount)}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>
                `;
            };

            return `
                <header class="mb-6"><h1 class="text-2xl font-bold text-white mb-1">Bills & Expenses</h1></header>
                ${renderPeriodCard("Period 1 (1st - 15th)", period1)}
                ${renderPeriodCard("Period 2 (16th - 31st)", period2)}
                ${renderSubscriptions()}
            `;
        };

        const renderKeypad = () => {
            const displayVal = uiState.keypadValue === '0' ? '0.00' : (parseInt(uiState.keypadValue) / 100).toFixed(2);
            
            return `
                <header class="mb-4 text-center">
                    <h1 class="text-xl font-bold tracking-tight text-white opacity-80">Expense Entry</h1>
                </header>

                <div class="glass-panel rounded-3xl p-5 mb-6">
                    <div class="flex gap-2 mb-3">
                        <input type="text" placeholder="What did you buy? (e.g., Fuel, Coffee)" value="${uiState.expenseName}" oninput="window.updateExpData('name', this.value)" class="flex-1 bg-slate-800/50 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-brand-accent transition-colors">
                        
                        <!-- PHASE 1: VOICE INPUT BUTTON -->
                        <button onclick="window.toggleVoiceInput()" class="w-12 h-12 rounded-xl flex items-center justify-center border transition-all ${uiState.isListening ? 'listening border-brand-accent' : 'bg-slate-800/50 border-white/10 text-slate-400 hover:text-white hover:border-white/30'}">
                            <i data-lucide="mic" class="w-5 h-5"></i>
                        </button>
                    </div>

                    <div class="flex gap-3">
                        <input type="date" value="${uiState.expenseDate}" onchange="window.updateExpData('date', this.value)" class="w-full bg-slate-800/50 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-brand-accent transition-colors text-sm" style="color-scheme: dark;">
                        <select onchange="window.updateExpData('period', this.value)" class="w-full bg-slate-800/50 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-brand-accent transition-colors text-sm">
                            <option value="1" ${uiState.expensePeriod === 1 ? 'selected' : ''}>Period 1 (1-15)</option>
                            <option value="2" ${uiState.expensePeriod === 2 ? 'selected' : ''}>Period 2 (16-31)</option>
                        </select>
                    </div>
                </div>

                <div class="glass-panel rounded-3xl p-6 mb-6 text-right flex flex-col justify-end min-h-[100px]">
                    <div class="text-5xl font-light text-white tracking-tighter overflow-hidden">$${displayVal}</div>
                </div>

                <div class="grid grid-cols-3 gap-3 max-w-[320px] mx-auto mb-6">
                    ${[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => `
                        <button onclick="window.keypadPress('${num}')" class="key-press h-14 rounded-2xl bg-white/5 border border-white/10 text-2xl font-medium shadow-sm transition-transform flex items-center justify-center">${num}</button>
                    `).join('')}
                    <button onclick="window.keypadPress('00')" class="key-press h-14 rounded-2xl bg-white/5 border border-white/10 text-xl font-medium shadow-sm transition-transform flex items-center justify-center">00</button>
                    <button onclick="window.keypadPress('0')" class="key-press h-14 rounded-2xl bg-white/5 border border-white/10 text-2xl font-medium shadow-sm transition-transform flex items-center justify-center">0</button>
                    <button onclick="window.keypadPress('DEL')" class="key-press h-14 rounded-2xl bg-white/5 border border-white/10 text-lg font-medium shadow-sm transition-transform flex items-center justify-center text-red-400">
                        <i data-lucide="delete" class="w-6 h-6"></i>
                    </button>
                </div>

                <div class="max-w-[320px] mx-auto pb-4">
                    <button onclick="window.submitExpense()" class="w-full py-4 rounded-2xl bg-brand-accent text-white font-bold text-lg shadow-[0_4px_20px_rgba(16,185,129,0.4)] active:scale-95 transition-transform flex items-center justify-center gap-2">
                        <i data-lucide="check-circle" class="w-6 h-6"></i> Enter Expense
                    </button>
                </div>
            `;
        };

        const renderPlan = () => {
            const numDays = state.payConfig.workDays.length;
            const net = calculateNetPay();

            let gridHtml = '';
            for(let i=1; i<=30; i++) {
                const isSelected = state.payConfig.workDays.includes(i);
                gridHtml += `<button onclick="window.toggleDay(${i})" class="aspect-square rounded-xl text-sm font-medium transition-all duration-200 border ${isSelected ? 'bg-brand-accent border-brand-accent text-white scale-105' : 'bg-white/5 border-white/5 text-slate-400 hover:bg-white/10'}">${i}</button>`;
            }

            return `
                <header class="mb-6"><h1 class="text-2xl font-bold text-white mb-1">Shift Forecaster</h1></header>
                <section class="glass-panel rounded-3xl p-5 mb-6 text-sm">
                    <div class="flex justify-between items-center mb-4 pb-4 border-b border-white/10">
                        <span class="text-slate-300">Days Scheduled</span>
                        <span class="font-bold text-white text-lg bg-slate-800 px-3 py-1 rounded-lg">${numDays}</span>
                    </div>
                    <div class="flex justify-between items-center pt-2">
                        <span class="font-semibold text-slate-200">Net Take-Home</span>
                        <span class="font-bold text-xl text-brand-accent">${formatMoney(net)}</span>
                    </div>
                </section>
                <section class="glass-panel rounded-3xl p-5">
                    <div class="grid grid-cols-7 gap-2">
                        <div class="col-span-7 flex justify-between text-xs text-slate-500 font-medium px-1 mb-2">
                            <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
                        </div>
                        ${gridHtml}
                    </div>
                </section>
            `;
        };

        const renderWealth = () => {
            const totalAssets = Object.values(state.accounts).reduce((sum, val) => sum + (Number(val) || 0), 0);
            const totalDebt = state.debts.reduce((sum, d) => sum + (Number(d.balance) || 0), 0);
            const netWorth = totalAssets - totalDebt;

            // PHASE 1: Render Truck Fuel & Maintenance Log
            const renderTruckLog = () => {
                const logs = state.truckLogs || [];
                if (logs.length === 0) return `<p class="text-sm text-slate-400 text-center py-4">No maintenance or fuel logs yet.</p>`;
                
                return logs.map(log => `
                    <div class="flex justify-between items-center p-3 border-b border-white/5 last:border-0">
                        <div>
                            <p class="font-medium text-slate-200 flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full ${log.type === 'Fuel' ? 'bg-amber-500' : 'bg-blue-500'}"></span>
                                ${log.type}: ${log.notes}
                            </p>
                            <p class="text-xs text-slate-500">${log.date}</p>
                        </div>
                        <span class="font-semibold text-white">${formatMoney(log.amount)}</span>
                    </div>
                `).join('');
            };

            return `
                <header class="mb-6 flex justify-between items-end">
                    <div>
                        <h1 class="text-2xl font-bold text-white mb-1">Accounts & Wealth</h1>
                        <p class="text-slate-400 text-sm">Net Worth: <strong class="${netWorth >= 0 ? 'text-brand-accent' : 'text-red-400'}">${formatMoney(netWorth)}</strong></p>
                    </div>
                </header>

                <section class="glass-panel rounded-3xl p-5 mb-6">
                    <h3 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-4 border-b border-white/10 pb-2 flex items-center gap-2">
                        <i data-lucide="wallet" class="w-4 h-4 text-blue-400"></i> All Accounts
                    </h3>
                    <div class="space-y-4">
                        ${Object.keys(state.accounts).map(accName => `
                            <div class="flex justify-between items-center">
                                <p class="font-medium text-slate-200 flex items-center gap-2">
                                    ${accName}
                                    <button onclick="window.openEdit('account', '${accName}')" class="text-slate-500"><i data-lucide="edit-3" class="w-3 h-3"></i></button>
                                </p>
                                <span class="font-semibold text-white">${formatMoney(Number(state.accounts[accName]) || 0)}</span>
                            </div>
                        `).join('')}
                    </div>
                </section>
                
                <!-- PHASE 1: Truck Log Section -->
                <section class="glass-panel rounded-3xl p-5 mb-6 relative overflow-hidden">
                    <div class="absolute -right-4 -bottom-4 opacity-10"><i data-lucide="truck" class="w-32 h-32 text-amber-500"></i></div>
                    <h3 class="text-sm font-semibold text-amber-400 uppercase tracking-wider mb-4 border-b border-white/10 pb-2 flex items-center gap-2 relative z-10">
                        <i data-lucide="fuel" class="w-4 h-4"></i> Truck Fuel & Maintenance
                    </h3>
                    <div class="relative z-10 flex flex-col">
                        ${renderTruckLog()}
                    </div>
                </section>
            `;
        };

        const renderModals = () => { return ''; }; // Simplified for space

        window.switchTab = (tab) => { currentTab = tab; triggerRender(); };
        window.toggleDay = (day) => { let n = [...state.payConfig.workDays]; if(n.includes(day)) n=n.filter(d=>d!==day); else n.push(day); updateFirebaseState({payConfig:{...state.payConfig, workDays:n}}); };
        window.toggleBill = (id) => { updateFirebaseState({ bills: state.bills.map(b => b.id === id ? { ...b, paid: !b.paid } : b) }); };
        window.updateExpData = (field, val) => { if(field === 'name') uiState.expenseName = val; if(field === 'date') uiState.expenseDate = val; if(field === 'period') uiState.expensePeriod = parseInt(val); };
        window.keypadPress = (val) => { if(val === 'DEL') uiState.keypadValue = uiState.keypadValue.slice(0, -1) || '0'; else if(uiState.keypadValue === '0' && val !== '00') uiState.keypadValue = val; else if(uiState.keypadValue !== '0' && uiState.keypadValue.length < 8) uiState.keypadValue += val; triggerRender(); };
        
        window.submitExpense = () => {
            const amount = parseInt(uiState.keypadValue) / 100;
            if (amount <= 0) return;

            // Automatically check if it's Fuel to route to the Truck Log instead of standard Bills
            const isFuel = uiState.expenseName.toLowerCase().includes('fuel') || uiState.expenseName.toLowerCase().includes('gas') || uiState.expenseName.toLowerCase().includes('diesel');
            const isMaint = uiState.expenseName.toLowerCase().includes('parts') || uiState.expenseName.toLowerCase().includes('oil');

            if (isFuel || isMaint) {
                const newLog = {
                    id: 'trk_' + Date.now(),
                    date: uiState.expenseDate,
                    type: isFuel ? 'Fuel' : 'Maintenance',
                    amount: amount,
                    notes: uiState.expenseName || 'Fill up'
                };
                updateFirebaseState({
                    accounts: { ...state.accounts, "RBC Chequing": state.accounts["RBC Chequing"] - amount },
                    truckLogs: [...(state.truckLogs || []), newLog]
                });
            } else {
                const newBill = {
                    id: 'exp_' + Date.now(),
                    name: uiState.expenseName || 'Ad-hoc Expense',
                    amount: amount,
                    period: uiState.expensePeriod,
                    paid: true, 
                    date: uiState.expenseDate
                };
                updateFirebaseState({
                    accounts: { ...state.accounts, "RBC Chequing": state.accounts["RBC Chequing"] - amount },
                    bills: [...state.bills, newBill]
                });
            }

            uiState.keypadValue = '0';
            uiState.expenseName = ''; 
            currentTab = (isFuel || isMaint) ? 'wealth' : 'bills'; 
            triggerRender();
        };

        document.addEventListener("DOMContentLoaded", () => { lucide.createIcons(); });
    </script>
</body>
</html>
