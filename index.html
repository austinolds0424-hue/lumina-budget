window.forceStartOffline = function() {

window.emergencyTimer = setTimeout(() => {
    const debug = document.getElementById('debug-text');
    if(debug) debug.innerText = "Network blocked. Booting from local memory...";

}, 4000);

async function initCloudState() {
    const debug = document.getElementById('debug-text');
    try {
        debug.innerText = "Step 1/3: Downloading Cloud Modules...";
        const appModule = await import("https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js");
        const firestoreModule = await import("https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js");
        const authModule = await import("https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js");

        debug.innerText = "Step 2/3: Authenticating...";
        const firebaseConfig = {
            apiKey: "AIzaSyDDAEXVWjIAVhxbGGoXwf7DCNcpLnWbef8",
            authDomain: "lumina-budget-68f2e.firebaseapp.com",
            projectId: "lumina-budget-68f2e",
            storageBucket: "lumina-budget-68f2e.firebasestorage.app",
            messagingSenderId: "607768723800",
            appId: "1:607768723800:web:f9ba689c83778ffd8a252d"
        };
        const app = appModule.initializeApp(firebaseConfig);
        const db = firestoreModule.getFirestore(app);
        const auth = authModule.getAuth(app);
        stateDocRef = firestoreModule.doc(db, "budgetApp", "mainState");
        fb_setDoc = firestoreModule.setDoc;

        await authModule.signInAnonymously(auth);
        
        debug.innerText = "Step 3/3: Syncing interface...";
        const docSnap = await firestoreModule.getDoc(stateDocRef);
        
        if (!docSnap.exists()) {
            const localMemory = localStorage.getItem('lumina_local_save');
            if (localMemory) appState = JSON.parse(localMemory);
            else appState = DEFAULT_DATA;
            await fb_setDoc(stateDocRef, appState);
        } else {
            appState = docSnap.data();
            let needsUpdate = false;
            if (!appState.payConfig) { appState.payConfig = { grossDaily: 601.87, taxRate: 32.07, dailyReimbursements: 85.72, fixedDeductions: 132.94, workDays: [] }; needsUpdate = true; }
            if (!appState.hitch || typeof appState.hitch.start === 'string') { appState.hitch = { active: false, start: null, earned: 0 }; needsUpdate = true; }
            if (needsUpdate) await fb_setDoc(stateDocRef, appState);
        }

        clearTimeout(window.emergencyTimer); 

        firestoreModule.onSnapshot(stateDocRef, (snapshot) => {
            if (snapshot.exists()) {
                appState = snapshot.data();
                if (!appState.payConfig) appState.payConfig = { grossDaily: 601.87, taxRate: 32.07, dailyReimbursements: 85.72, fixedDeductions: 132.94, workDays: [] };
                if (!appState.hitch) appState.hitch = { active: false, start: null, earned: 0 };
                localStorage.setItem('lumina_local_save', JSON.stringify(appState)); 
                renderApp();
            }
        });

        document.getElementById('loading-overlay').style.display = 'none';
        document.getElementById('cloud-status').classList.add('bg-green-500', 'animate-pulse');
        renderApp();
        
    } catch (error) {
        clearTimeout(window.emergencyTimer);
        console.error(error);
        debug.innerText = "Cloud modules blocked. Forcing offline mode...";
        setTimeout(() => window.forceStartOffline(), 1500);
    }
}
