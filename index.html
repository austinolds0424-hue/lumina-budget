<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lumina Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { glass: { light: 'rgba(255, 255, 255, 0.4)', dark: 'rgba(30, 41, 59, 0.6)' }, glassBorder: { light: 'rgba(255, 255, 255, 0.5)', dark: 'rgba(255, 255, 255, 0.1)' } } } } }
    </script>
    <style>
        :root { --bg-gradient-light: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); --bg-gradient-dark: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); }
        body { background: var(--bg-gradient-light); background-attachment: fixed; min-height: 100vh; transition: background 0.5s ease; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #1f2937; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .dark body { background: var(--bg-gradient-dark); color: #f8fafc; }
        .glass-panel { background: var(--tw-colors-glass-light); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--tw-colors-glassBorder-light); box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15); border-radius: 1.5rem; }
        .dark .glass-panel { background: var(--tw-colors-glass-dark); border: 1px solid var(--tw-colors-glassBorder-dark); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .glass-input { background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 0.75rem; padding: 0.75rem; width: 100%; outline: none; transition: all 0.2s; color: inherit; }
        .dark .glass-input { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
        .tab-content { display: none; } .tab-content.active { display: block; }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.2); transition: .4s; border-radius: 34px; border: 1px solid rgba(255,255,255,0.3); }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #3b82f6; border-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(24px); }
        #loading-overlay { position: fixed; inset: 0; z-index: 1000; background: var(--tw-colors-glass-light); backdrop-filter: blur(20px); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .dark #loading-overlay { background: var(--tw-colors-glass-dark); }
    </style>
</head>
<body class="pb-32">

    <div id="loading-overlay">
        <div class="h-10 w-10 border-4 border-t-blue-500 rounded-full animate-spin"></div>
        <h2 class="mt-4 font-bold">Syncing Engine...</h2>
    </div>

    <div id="logan-modal" class="hidden fixed inset-0 z-[1000] bg-black/70 backdrop-blur-md flex items-center justify-center p-4">
        <div class="bg-[#1c1c1e] w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl border border-gray-700">
            <div class="bg-[#2c2c2e] p-3 flex items-center gap-3 border-b border-gray-800">
                <div class="w-10 h-10 rounded-full bg-gray-600 flex items-center justify-center overflow-hidden">
                    <img src="logan.jpg" onerror="this.src='https://api.dicebear.com/8.x/avataaars/svg?seed=Logan'" class="w-full h-full object-cover">
                </div>
                <div><div class="font-bold text-white text-sm">Logan</div><div class="text-blue-500 text-[10px]">iMessage</div></div>
            </div>
            <div class="p-5 space-y-5">
                <div class="bg-[#26252a] text-white p-4 rounded-2xl rounded-bl-none text-sm" id="logan-msg"></div>
                <div class="flex gap-3"><button onclick="confirmLogan(false)" class="flex-1 bg-gray-700 py-3 rounded-xl font-bold text-sm">Nah, save it</button><button onclick="confirmLogan(true)" class="flex-1 bg-blue-600 py-3 rounded-xl font-bold text-sm">Yeah, buy it</button></div>
            </div>
        </div>
    </div>

    <header class="glass-panel mx-4 mt-4 p-4 flex justify-between items-center sticky top-4 z-50">
        <h1 class="text-xl font-bold">Lumina</h1>
        <div id="cloud-status" class="w-3 h-3 rounded-full bg-yellow-400"></div>
    </header>

    <main class="p-4" id="app-container"></main>

    <nav class="glass-panel fixed bottom-0 left-0 right-0 mx-4 mb-4 p-2 z-50 flex justify-between px-4">
        <button onclick="switchTab('dashboard')" class="nav-btn flex flex-col items-center p-2" data-target="dashboard"><i data-lucide="layout-dashboard"></i></button>
        <button onclick="switchTab('bills')" class="nav-btn flex flex-col items-center p-2" data-target="bills"><i data-lucide="receipt"></i></button>
        <button onclick="switchTab('keypad')" class="nav-btn flex flex-col items-center p-2 bg-blue-600 rounded-full -mt-4 text-white" data-target="keypad"><i data-lucide="plus"></i></button>
        <button onclick="switchTab('calendar')" class="nav-btn flex flex-col items-center p-2" data-target="calendar"><i data-lucide="calendar"></i></button>
        <button onclick="switchTab('wealth')" class="nav-btn flex flex-col items-center p-2" data-target="wealth"><i data-lucide="wrench"></i></button>
    </nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";

    let appState = null;
    let activeTab = 'dashboard'; // PERSISTENCE VARIABLE

    // Firebase Config
    const db = getFirestore(initializeApp({ apiKey: "AIzaSyDDAEXVWjIAVhxbGGoXwf7DCNcpLnWbef8", authDomain: "lumina-budget-68f2e.firebaseapp.com", projectId: "lumina-budget-68f2e" }));
    const stateDocRef = doc(db, "budgetApp", "mainState");

    async function init() {
        await signInAnonymously(getAuth());
        const snap = await getDoc(stateDocRef);
        appState = snap.exists() ? snap.data() : null;
        onSnapshot(stateDocRef, (s) => { if(s.exists()) { appState = s.data(); render(); } });
        render();
    }

    function switchTab(tabId) {
        activeTab = tabId; // SAVE TAB STATE
        render();
    }

    function render() {
        const scrollPos = window.scrollY; // SNAPSHOT SCROLL
        document.getElementById('app-container').innerHTML = ... // (omitted for brevity - use full render code below)
        document.getElementById(`tab-${activeTab}`).classList.add('active'); // RESTORE TAB
        lucide.createIcons();
        window.scrollTo(0, scrollPos); // RESTORE SCROLL
    }
    
    // ... (rest of the logic remains the same)
    init();
</script>
</body>
</html>
