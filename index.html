<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #0f2027; color: white; min-height: 100vh; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; }
        .tab-content { display: none; } .tab-content.active { display: block; }
    </style>
</head>
<body class="pb-32">
    <main id="app-container" class="p-4"></main>
    <nav class="glass fixed bottom-0 left-0 right-0 mx-4 mb-4 p-2 flex justify-between px-4">
        <button onclick="switchTab('dashboard')" class="p-3">Dash</button>
        <button onclick="switchTab('calendar')" class="p-3">Plan</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";

        let appState = { payConfig: { grossDaily: 601.87, taxRate: 32.07, dailyReimbursements: 85.72, fixedDeductions: 132.94, workDays: [] }};
        let activeTab = 'dashboard';
        const db = getFirestore(initializeApp({ apiKey: "AIzaSyDDAEXVWjIAVhxbGGoXwf7DCNcpLnWbef8", authDomain: "lumina-budget-68f2e.firebaseapp.com", projectId: "lumina-budget-68f2e" }));
        const ref = doc(db, "budgetApp", "mainState");

        async function init() {
            await signInAnonymously(getAuth());
            onSnapshot(ref, (s) => { if(s.exists()) { appState = s.data(); render(); } });
        }

        window.toggleWorkDay = (day) => {
            if(appState.payConfig.workDays.includes(day)) appState.payConfig.workDays = appState.payConfig.workDays.filter(d => d !== day);
            else appState.payConfig.workDays.push(day);
            setDoc(ref, appState);
        };

        window.switchTab = (tab) => { activeTab = tab; render(); };

        function render() {
            const days = appState.payConfig.workDays.length;
            const net = (days * appState.payConfig.grossDaily * (1 - appState.payConfig.taxRate/100)) - appState.payConfig.fixedDeductions + (days * appState.payConfig.dailyReimbursements);

            document.getElementById('app-container').innerHTML = `
                <div id="tab-dashboard" class="tab-content ${activeTab === 'dashboard' ? 'active' : ''}">
                    <div class="glass p-6 text-center">
                        <h2 class="text-sm opacity-60">Live Projected Net</h2>
                        <div class="text-4xl font-bold text-green-400">$${net.toFixed(2)}</div>
                    </div>
                </div>
                <div id="tab-calendar" class="tab-content ${activeTab === 'calendar' ? 'active' : ''}">
                    <div class="glass p-4 grid grid-cols-7 gap-2">
                        ${Array.from({length: 30}, (_, i) => i + 1).map(day => `
                            <div onclick="toggleWorkDay(${day})" class="aspect-square flex items-center justify-center rounded-lg cursor-pointer ${appState.payConfig.workDays.includes(day) ? 'bg-orange-500' : 'bg-gray-800'}">
                                ${day}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        init();
    </script>
</body>
</html>
