    <style>
        :root {
            --bg-gradient-light: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            --bg-gradient-dark: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);

        body {
            background: var(--bg-gradient-light);
            background-attachment: fixed;
            min-height: 100vh;
            transition: background 0.5s ease;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;

            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .dark body {
            background: var(--bg-gradient-dark);
            color: #f8fafc;
        }

        /* Abstract Background Shapes for better Glassmorphism */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 20s infinite ease-in-out alternate;
        }
        .shape1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #ff9a9e; }
        .shape2 { bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: #a18cd1; }

        .dark .shape2 { background: #b21f1f; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* Glassmorphism Classes */
        .glass-panel {
            background: var(--tw-colors-glass-light);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--tw-colors-glassBorder-light);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            border-radius: 1.5rem;
        }
        .dark .glass-panel {
            background: var(--tw-colors-glass-dark);
            border: 1px solid var(--tw-colors-glassBorder-dark);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 0.75rem;
            padding: 0.75rem;
            width: 100%;
            outline: none;
            transition: all 0.2s;
            color: inherit;
        }
        .dark .glass-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        .dark .glass-input option {
            background: #1e293b;
            color: white;
        }
        .glass-input:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.2);
        }

        /* Checkbox styling */
        .checkbox-wrapper {
            position: relative;
            display: inline-block;
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }
        .checkbox-wrapper input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .checkmark {
            position: absolute;
            top: 0; left: 0; height: 24px; width: 24px;
            background-color: rgba(255, 255, 255, 0.5);
            border: 2px solid rgba(0,0,0,0.2);
            border-radius: 6px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .dark .checkmark { background-color: rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.3); }
        .checkbox-wrapper input:checked ~ .checkmark {
            background-color: #3b82f6;
            border-color: #3b82f6;
        }
        .checkmark:after {
            content: ""; position: absolute; display: none;
            left: 7px; top: 3px; width: 6px; height: 12px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
        .checkbox-wrapper input:checked ~ .checkmark:after { display: block; }

        /* Keypad Styling */
        .keypad-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 1rem;
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
        }
        .dark .keypad-btn {
            background: rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.1);
        }
        .keypad-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.4);
        }
        .dark .keypad-btn:active { background: rgba(255, 255, 255, 0.2); }

        /* Slider Styling */
        input[type=range] {
            -webkit-appearance: none; width: 100%; background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 20px; width: 20px;
            border-radius: 50%; background: #3b82f6; cursor: pointer;
            margin-top: -8px; box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 6px; cursor: pointer;
            background: rgba(0,0,0,0.1); border-radius: 3px;
        }
        .dark input[type=range]::-webkit-slider-runnable-track { background: rgba(255,255,255,0.2); }

        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        .tab-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Bottom Nav Safe Area for Samsung Gestures */
        .pb-safe { padding-bottom: calc(7rem + env(safe-area-inset-bottom, 20px)); }
        .nav-safe { margin-bottom: env(safe-area-inset-bottom, 10px); }

        /* Full Screen Loading Overlay */
        #loading-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: var(--tw-colors-glass-light);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);

        .spinner {

            border-top: 4px solid #3b82f6; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin-bottom: 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

(function setupPWA() {
    const manifest = {
        name: "Lumina Personal Finance",

        start_url: "./?source=pwa",
        id: "lumina-finance-app",

        theme_color: "#1e293b",
        orientation: "portrait-primary",
        icons: [{ src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI1MCIgZmlsbD0iIzNiODJmNiIvPjx0ZXh0IHg9IjUwIiB5PSI2NCIgZm9udC1zaXplPSI1MCIgZmlsbD0iI2ZmZiIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiPkw8L3RleHQ+PC9zdmc+", sizes: "192x192", type: "image/svg+xml" }]
    };
    const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
    const manifestUrl = URL.createObjectURL(manifestBlob);
    const link = document.createElement('link');
    link.rel = 'manifest'; link.href = manifestUrl;
    document.head.appendChild(link);

    const swCode = `
        self.addEventListener('install', (e) => self.skipWaiting());
        self.addEventListener('activate', (e) => self.clients.claim());
        self.addEventListener('fetch', (e) => {
            e.respondWith(
                fetch(e.request).catch(() => new Response('App Offline Mode Active', { headers: { 'Content-Type': 'text/plain' } }))
            );
        });
    `;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(swBlob);
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register(swUrl).catch(console.error);
    }
})();
</script>

let appState = null;
let editingBillId = null; 
const stateDocRef = doc(db, "budgetApp", "mainState");

// Initialize Cloud Connection
async function initCloudState() {
    try {
        await signInAnonymously(auth);
        
        // Check if doc exists first
        const docSnap = await getDoc(stateDocRef);
        if (!docSnap.exists()) {
            console.log("No existing cloud data found. Initializing DEFAULT_DATA...");
            await setDoc(stateDocRef, DEFAULT_DATA);
            appState = DEFAULT_DATA;
        } else {
            appState = docSnap.data();
        }

        // Setup Real-time Listener
        onSnapshot(stateDocRef, (snapshot) => {
            if (snapshot.exists()) {
                appState = snapshot.data();
                renderApp();
            }
        }, (error) => {
            console.error("Firebase Sync Error: ", error);
        });

        // Hide loader, start app
        document.getElementById('loading-overlay').classList.add('hidden');
        renderApp();
        
    } catch (error) {
        console.error("Error connecting to Firebase:", error);
        document.getElementById('loading-overlay').innerHTML = `
            <div class="glass-panel p-6 text-center text-red-500">
                <i data-lucide="wifi-off" class="w-12 h-12 mx-auto mb-2"></i>
                <p class="font-bold">Cloud Connection Failed</p>
                <p class="text-xs mt-2">${error.message}</p>
            </div>
        `;
        lucide.createIcons();
    }
}

// Global Save Function -> Pushes to Firebase
async function saveState() {
    // Optimistic UI update instantly
    renderApp(); 
    document.getElementById('cloud-status').classList.remove('bg-green-500', 'animate-pulse');
    document.getElementById('cloud-status').classList.add('bg-yellow-400');
    
    try {
        await setDoc(stateDocRef, appState);
        // Success indicator
        document.getElementById('cloud-status').classList.remove('bg-yellow-400');
        document.getElementById('cloud-status').classList.add('bg-green-500', 'animate-pulse');
    } catch (error) {
        console.error("Failed to push state to cloud:", error);
        document.getElementById('cloud-status').classList.remove('bg-yellow-400');
        document.getElementById('cloud-status').classList.add('bg-red-500');
    }
}

function formatCurrency(amount) {
    return new Intl.NumberFormat('en-CA', { style: 'currency', currency: 'CAD' }).format(amount);
}

/**
 * THEME & NAVIGATION
 */
function toggleTheme() {
    document.documentElement.classList.toggle('dark');
}

function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.getElementById(`tab-${tabId}`).classList.add('active');
    
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.remove('text-blue-500', 'dark:text-blue-400');
        if(btn.dataset.target !== 'keypad') {
            btn.classList.add('text-gray-500', 'dark:text-gray-400', 'opacity-70');
        }
    });

    const activeBtn = document.querySelector(`.nav-btn[data-target="${tabId}"]`);
    if(activeBtn && tabId !== 'keypad') {
        activeBtn.classList.remove('text-gray-500', 'dark:text-gray-400', 'opacity-70');
        activeBtn.classList.add('text-blue-500', 'dark:text-blue-400');
    }
}

/**
 * AI INSIGHTS GENERATOR
 */
function generateInsights() {
    if(!appState) return '';
    const totalIncome = appState.income.period1 + appState.income.period2;
    const totalBills = appState.bills.reduce((sum, b) => sum + b.amount, 0);
    const unpaidCount = appState.bills.filter(b => !b.paid).length;
    let highestInterestDebt = appState.debts.length ? appState.debts.reduce((prev, current) => (prev.interest > current.interest) ? prev : current) : null;
    
    let insights = [];
    const remaining = totalIncome - totalBills;
    if(remaining > 0) insights.push(`Your expected income covers all bills with <strong>${formatCurrency(remaining)}</strong> left over for goals and expenses.`);
    if (unpaidCount > 0) insights.push(`You currently have <strong>${unpaidCount} bills</strong> remaining to be checked off this month.`);
    else insights.push(`🎉 All bills are checked off for this month! Great job.`);
    if (highestInterestDebt && highestInterestDebt.interest > 0) insights.push(`Putting an extra $200 towards <strong>${highestInterestDebt.name}</strong> saves the most interest (Avalanche method).`);

    return insights.map(i => `<div class="glass-panel p-3 mb-2 text-sm flex gap-3 items-start"><i data-lucide="sparkles" class="w-5 h-5 text-yellow-500 shrink-0 mt-0.5"></i> <div>${i}</div></div>`).join('');
}

    if(!appState) return '';
    const netWorth = appState.accounts.reduce((sum, a) => sum + a.balance, 0) - appState.debts.reduce((sum, d) => sum + d.balance, 0);
    
    return `
        <div id="tab-dashboard" class="tab-content active space-y-6">
            <div class="glass-panel p-6 text-center">
                <p class="text-sm uppercase tracking-wider opacity-70 mb-1">Estimated Net Worth</p>

}

    if(bill) {
        bill.paid = !bill.paid;
        saveState();
    }
}

function deleteBill(id) {
    appState.bills = appState.bills.filter(b => b.id !== id);
    if(editingBillId === id) cancelEditBill();

    if(!bill) return;

    document.getElementById('new-bill-amount').value = bill.amount;
    document.getElementById('new-bill-period').value = bill.period;
    document.getElementById('new-bill-date').value = bill.dueDate || '';
    
    editingBillId = id;
    const btn = document.getElementById('submit-bill-btn');
    btn.innerHTML = `<i data-lucide="save"></i> Update Bill`;
    btn.classList.replace('bg-blue-600', 'bg-green-600');
    btn.classList.replace('hover:bg-blue-700', 'hover:bg-green-700');
    document.getElementById('cancel-edit-btn').classList.remove('hidden');
    
    window.scrollTo({ top: 0, behavior: 'smooth' });

}

function cancelEditBill() {
    editingBillId = null;
    document.getElementById('new-bill-name').value = '';
    document.getElementById('new-bill-amount').value = '';
    document.getElementById('new-bill-period').value = '1';
    document.getElementById('new-bill-date').value = '';
    
    const btn = document.getElementById('submit-bill-btn');
    btn.innerHTML = `<i data-lucide="plus-circle"></i> Add Bill`;
    btn.classList.replace('bg-green-600', 'bg-blue-600');
    btn.classList.replace('hover:bg-green-700', 'hover:bg-blue-700');
    document.getElementById('cancel-edit-btn').classList.add('hidden');
    lucide.createIcons();
}

function submitBill() {
    const name = document.getElementById('new-bill-name').value.trim();
    const amount = parseFloat(document.getElementById('new-bill-amount').value);
    const period = parseInt(document.getElementById('new-bill-period').value);
    const dueDateInput = document.getElementById('new-bill-date').value;
    const dueDate = dueDateInput ? parseInt(dueDateInput) : (period === 1 ? 1 : 16);

    if(name && !isNaN(amount) && amount > 0) {
        if(editingBillId) {
            const bill = appState.bills.find(b => b.id === editingBillId);
            if(bill) {
                bill.name = name; bill.amount = amount; bill.period = period; bill.dueDate = dueDate;
            }
            editingBillId = null;
        } else {
            appState.bills.push({ id: 'b_' + Date.now(), name, amount, period, dueDate, paid: false });
        }
        saveState(); 
    }
}

/**
 * KEYPAD LOGIC

function keypadPress(val) {
    if (val === 'DEL') {
        appState.keypadAmount = appState.keypadAmount.slice(0, -1);
        if (appState.keypadAmount === '') appState.keypadAmount = "0";
    } else if (val === '.') {
        if (!appState.keypadAmount.includes('.')) appState.keypadAmount += '.';
    } else {
        if (appState.keypadAmount === "0") appState.keypadAmount = val;
        else {
            if(appState.keypadAmount.includes('.') && appState.keypadAmount.split('.')[1].length >= 2) return;
            appState.keypadAmount += val;
        }
    }
    document.getElementById('keypad-display').innerText = '$' + appState.keypadAmount;
}

function saveExpense() {
    const amt = parseFloat(appState.keypadAmount);
    if(amt > 0) {
        appState.expenses.push({ id: Date.now(), category: appState.keypadCategory, amount: amt, date: new Date().toISOString() });
        appState.keypadAmount = "0";
        saveState();
        
        const btn = document.getElementById('save-expense-btn');
        const ogText = btn.innerHTML;
        btn.innerHTML = `<i data-lucide="check" class="w-6 h-6 inline"></i> Saved to Cloud!`;
        btn.classList.add('bg-green-500');
        lucide.createIcons();
        setTimeout(() => {
            btn.innerHTML = ogText;
            btn.classList.remove('bg-green-500');
            lucide.createIcons();
            document.getElementById('keypad-display').innerText = '$0';
        }, 1500);
    }
}

/**
 * CALENDAR LOGIC
 */
function renderCalendar() {
    if(!appState) return '';
    const today = new Date();
    const currentYear = today.getFullYear();
    const currentMonth = today.getMonth();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const firstDayOfWeek = new Date(currentYear, currentMonth, 1).getDay();
    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    
    let grid = '';
    for(let i=0; i<firstDayOfWeek; i++) grid += `<div class="aspect-square"></div>`;

    for(let i=1; i<=daysInMonth; i++) {
        const isToday = i === today.getDate();
        const isPayday = i === 1 || i === 15;
        const dayBills = appState.bills.filter(b => b.dueDate === i);
        const hasUnpaid = dayBills.some(b => !b.paid);
        const hasPaid = dayBills.some(b => b.paid);
        
        let indicator = '';
        if(hasUnpaid) indicator = `<div class="w-2 h-2 rounded-full bg-red-400 mt-1 shadow-[0_0_5px_rgba(248,113,113,0.8)]"></div>`;
        else if(hasPaid) indicator = `<div class="w-2 h-2 rounded-full bg-green-500 mt-1"></div>`;
        else if(isPayday) indicator = `<div class="text-[10px] text-green-400 font-bold mt-1">PAY</div>`;

        grid += `
            <div class="aspect-square glass-panel flex flex-col items-center justify-center relative cursor-pointer hover:bg-white/10 transition ${isToday ? 'ring-2 ring-blue-500 bg-blue-500/20 shadow-lg scale-105 z-10' : ''}">
                <span class="text-sm font-bold ${isToday ? 'text-blue-100' : ''}">${i}</span>
                ${indicator}
            </div>
        `;
    }

    return `
        <div id="tab-calendar" class="tab-content space-y-6">
            <div class="glass-panel p-4">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold flex items-center gap-2"><i data-lucide="calendar-days"></i> ${monthNames[currentMonth]} ${currentYear}</h2>
                </div>
                <div class="flex flex-wrap gap-3 mb-4 text-xs font-medium justify-center">
                    <div class="flex items-center gap-1"><div class="w-2 h-2 rounded-full bg-red-400 shadow-[0_0_5px_rgba(248,113,113,0.8)]"></div> Unpaid Bill</div>
                    <div class="flex items-center gap-1"><div class="w-2 h-2 rounded-full bg-green-500"></div> Paid Bill</div>
                    <div class="flex items-center gap-1 font-bold text-green-400">PAY: Expected Payday</div>
                </div>
                <div class="grid grid-cols-7 gap-2">
                    ${['S','M','T','W','T','F','S'].map(d => `<div class="text-center text-xs opacity-50 font-bold pb-2">${d}</div>`).join('')}
                    ${grid}
                </div>
            </div>
            
            <div class="glass-panel p-4">
                <h3 class="font-bold mb-2 flex items-center gap-2"><i data-lucide="target"></i> Hitch / Paycheck Forecaster</h3>
                <div class="space-y-3">
                    <div>
                        <label class="text-xs opacity-70 block mb-1">Target Goal Amount ($)</label>
                        <input type="number" id="fc-target" class="glass-input" value="10000">
                    </div>
                    <div>
                        <label class="text-xs opacity-70 block mb-1">Savings Allocated per Check ($)</label>
                        <input type="number" id="fc-savings" class="glass-input" value="1200">
                    </div>
                    <button onclick="calculateForecast()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl mt-2 transition">Calculate Trajectory</button>
                    <div id="fc-result" class="text-center p-3 rounded-lg bg-blue-500/20 text-blue-100 font-medium text-sm mt-4 hidden"></div>
                </div>
            </div>
        </div>
    `;
}

function calculateForecast() {
    const target = parseFloat(document.getElementById('fc-target').value);
    const savings = parseFloat(document.getElementById('fc-savings').value);
    const resultDiv = document.getElementById('fc-result');
    if(savings > 0 && target > 0) {
        const checks = Math.ceil(target / savings);
        resultDiv.innerHTML = `It will take <strong>${checks} consecutive paychecks/hitches</strong> to reach ${formatCurrency(target)}.`;
        resultDiv.classList.remove('hidden');
    }
}

function addNewDebt() {
    const name = document.getElementById('new-debt-name').value;
    const balance = parseFloat(document.getElementById('new-debt-balance').value);
    const minPayment = parseFloat(document.getElementById('new-debt-min').value);
    const interest = parseFloat(document.getElementById('new-debt-int').value);

    if(name && balance) {
        appState.debts.push({ id: 'd_' + Date.now(), name, balance, minPayment: minPayment||0, interest: interest||0 });
        saveState(); 
    }
}

function updateInvestment() {
    const principal = parseFloat(document.getElementById('inv-principal').value);
    const monthly = parseFloat(document.getElementById('inv-monthly').value);
    const rate = parseFloat(document.getElementById('inv-rate').value) / 100;
    
    document.getElementById('lbl-principal').innerText = formatCurrency(principal);
    document.getElementById('lbl-monthly').innerText = formatCurrency(monthly);
    document.getElementById('lbl-rate').innerText = (rate*100).toFixed(1) + '%';

    const calc = (years) => {
        const n = 12, t = years, P = principal, PMT = monthly, r = rate;
        if (r === 0) return P + (PMT * 12 * t);
        const compoundFactor = Math.pow(1 + r/n, n*t);
        return (P * compoundFactor) + (PMT * ((compoundFactor - 1) / (r/n)));
    };

    document.getElementById('inv-5yr').innerText = formatCurrency(calc(5));
    document.getElementById('inv-10yr').innerText = formatCurrency(calc(10));
    document.getElementById('inv-25yr').innerText = formatCurrency(calc(25));
}
