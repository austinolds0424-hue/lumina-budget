<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumina Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg-gradient-dark: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); }
        body { background: var(--bg-gradient-dark); color: #f8fafc; min-height: 100vh; font-family: sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; }
        .glass-input { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 0.75rem; padding: 0.75rem; width: 100%; }
        .tab-content { display: none; } .tab-content.active { display: block; }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.2); border-radius: 34px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 3px; background-color: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(24px); }
    </style>
</head>
<body class="pb-32">
    <header class="glass-panel mx-4 mt-4 p-4 flex justify-between items-center sticky top-4 z-50">
        <h1 class="text-xl font-bold">Lumina</h1>
        <div id="cloud-status" class="w-3 h-3 rounded-full bg-yellow-400"></div>
    </header>

    <main class="p-4" id="app-container"></main>

    <nav class="glass-panel fixed bottom-0 left-0 right-0 mx-4 mb-4 p-2 z-50 flex justify-between px-4">
        <button onclick="switchTab('dashboard')" class="nav-btn p-3" data-target="dashboard"><i data-lucide="layout-dashboard"></i></button>
        <button onclick="switchTab('bills')" class="nav-btn p-3" data-target="bills"><i data-lucide="receipt"></i></button>
        <button onclick="switchTab('keypad')" class="nav-btn p-3 bg-blue-600 rounded-full -mt-4" data-target="keypad"><i data-lucide="plus"></i></button>
        <button onclick="switchTab('calendar')" class="nav-btn p-3" data-target="calendar"><i data-lucide="calendar"></i></button>
        <button onclick="switchTab('wealth')" class="nav-btn p-3" data-target="wealth"><i data-lucide="wrench"></i></button>
    </nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
    import { getFirestore, doc, getDoc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";

    let appState = {
        accounts: [{name: 'RBC', balance: 2500}], bills: [], expenses: [], debts: [], 
        camping: { saved: 0, target: 1500 }, garage: [], payConfig: { grossDaily: 601.87, taxRate: 32.07, dailyReimbursements: 85.72, fixedDeductions: 132.94, workDays: [] }, hitch: { active: false, start: null, earned: 0 }
    };
    let activeTab = 'dashboard';

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyDDAEXVWjIAVhxbGGoXwf7DCNcpLnWbef8", authDomain: "lumina-budget-68f2e.firebaseapp.com", projectId: "lumina-budget-68f2e" }));
    const ref = doc(db, "budgetApp", "mainState");

    async function init() {
        await signInAnonymously(getAuth());
        const snap = await getDoc(ref);
        if(snap.exists()) appState = snap.data();
        onSnapshot(ref, (s) => { if(s.exists()) { appState = s.data(); render(); } });
        render();
    }

    window.switchTab = (tab) => { activeTab = tab; render(); };

    function render() {
        const scroll = window.scrollY;
        document.getElementById('app-container').innerHTML = `
            <div id="tab-dashboard" class="tab-content ${activeTab === 'dashboard' ? 'active' : ''}">
                <div class="glass-panel p-6 text-center">
                    <p class="text-xs uppercase opacity-70">Hitch Taxi Meter</p>
                    <h2 class="text-4xl font-mono font-bold text-blue-400" id="live-meter">$0.00</h2>
                </div>
            </div>
            <div id="tab-bills" class="tab-content ${activeTab === 'bills' ? 'active' : ''}">...</div>
            <div id="tab-keypad" class="tab-content ${activeTab === 'keypad' ? 'active' : ''}">...</div>
            <div id="tab-calendar" class="tab-content ${activeTab === 'calendar' ? 'active' : ''}">...</div>
            <div id="tab-wealth" class="tab-content ${activeTab === 'wealth' ? 'active' : ''}">...</div>
        `;
        lucide.createIcons();
        window.scrollTo(0, scroll);
    }

    init();
</script>
</body>
</html>
